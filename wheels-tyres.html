<script>
const products=[
{
id:37,
name:"Orome Valar TH50D Carbon Road Disc Brake Wheelset",
price:85000,
mrp:"Rs 85,000",
image:"assets/products/orome-valar-th50d-black-main.jpg",
sizes:["Carbon"],
mainCategory:"wheels",
subCategory:"carbon"
}
,
{
id:7,
name:"Cyclami Tubeless Bicycle Presta Valves",
price:999,
mrp:"?1,999",
image:"assets/products/cyclami-presta-valves-1.webp",
sizes:["45mm","65mm","85mm"],
mainCategory:"valve"
},
{
id:30,
name:"Cyclami Ultra-Light TPU Bicycle Tube",
price:999,
mrp:"?1,500",
image:"assets/products/cyclami-tpu-tube-1.webp",
sizes:["700c 23-25","700c 28-32"],
mainCategory:"tubes"
},
{
id:54,
name:"ThinkRider TPU 28g Ultralight Bicycle Tube",
price:500,
mrp:"Rs 500",
image:"assets/products/thinkrider-tpu-28g-tube-1.webp",
sizes:["700C 23-32"],
mainCategory:"tubes"
},
{
id:31,
name:"Cyclami Multi-Functional Bicycle Tyre Lever",
price:299,
mrp:"?999",
image:"assets/products/cyclami-tyre-lever-3.webp",
sizes:[],
mainCategory:"tools"
}

];
window.cyclifyMergeSupplierProducts(products,"wheels-tyres.html");

const categories=[
{key:"wheels",label:"Wheels",image:"assets/products/orome-valar-th50d-black-main.jpg"},
{key:"tyres",label:"Tyres",image:"assets/categories/CAT_Wheels.png"},
{key:"tubes",label:"Tubes",image:"assets/products/cyclami-tpu-tube-1.webp"},
{key:"valve",label:"Valve",image:"assets/products/cyclami-presta-valves-1.webp"},
{key:"freehub-body",label:"Freehub Body",image:"assets/categories/CAT_Wheels.png"},
{key:"tools",label:"Tools",image:"assets/products/cyclami-tyre-lever-3.webp"},
{key:"hubs",label:"Hubs",image:"assets/categories/CAT_Wheels.png"}
];

const wheelSubCategories=[
{key:"alloy",label:"Alloy",image:"assets/categories/CAT_Wheels.png"},
{key:"carbon",label:"Carbon",image:"assets/products/orome-valar-th50d-black-main.jpg"}
];

const container=document.getElementById("products");
const categoryStrip=document.getElementById("categoryStrip");
const subCategoryStrip=document.getElementById("subCategoryStrip");
const categorySummary=document.getElementById("categorySummary");
const searchInput=document.getElementById("searchInput");
const sortSelect=document.getElementById("sortSelect");
const filterSelect=document.getElementById("filterSelect");
let activeCategory=new URLSearchParams(window.location.search).get("category")||"";
let activeSubCategory=new URLSearchParams(window.location.search).get("sub")||"";

function updateCartCount(){
const cartItems=JSON.parse(localStorage.getItem("cart"))||[];
const count=cartItems.reduce((total,item)=>total+(item.quantity||1),0);
const cartCount=document.getElementById("cartCount");
if(count>0){
cartCount.textContent=count;
cartCount.style.display="flex";
}
else{
cartCount.style.display="none";
}
}

function renderCategories(){
const visibleCategories=categories.filter(category=>
products.some(product=>product.mainCategory===category.key)
);

if(activeCategory&&!visibleCategories.some(category=>category.key===activeCategory)){
activeCategory="";
activeSubCategory="";
}

categoryStrip.innerHTML=visibleCategories.map(category=>`
<button class="category-pill ${category.key===activeCategory?"active":""}" onclick="selectCategory('${category.key}')">
<span class="category-icon"><img src="${category.image}" alt="${category.label}"></span>
<span>${category.label}</span>
</button>
`).join("");

subCategoryStrip.classList.toggle("active",activeCategory==="wheels");
const visibleSubCategories=wheelSubCategories.filter(category=>
products.some(product=>product.mainCategory==="wheels"&&product.subCategory===category.key)
);

if(activeSubCategory&&!visibleSubCategories.some(category=>category.key===activeSubCategory)){
activeSubCategory="";
}

subCategoryStrip.innerHTML=visibleSubCategories.map(category=>`
<button class="category-pill ${category.key===activeSubCategory?"active":""}" onclick="selectSubCategory('${category.key}')">
<span class="category-icon"><img src="${category.image}" alt="${category.label}"></span>
<span>${category.label}</span>
</button>
`).join("");
}

function productPassesFilter(product){
const selected=filterSelect?filterSelect.value:"all";
const price=Number(product.price)||0;
if(selected==="under-5000"){return price<5000;}
if(selected==="5000-20000"){return price>=5000&&price<=20000;}
if(selected==="above-20000"){return price>20000;}
return true;
}

function sortProducts(list){
const selected=sortSelect?sortSelect.value:"featured";
const sorted=[...list];
if(selected==="price-low"){sorted.sort((a,b)=>(Number(a.price)||0)-(Number(b.price)||0));}
else if(selected==="price-high"){sorted.sort((a,b)=>(Number(b.price)||0)-(Number(a.price)||0));}
else if(selected==="name"){sorted.sort((a,b)=>a.name.localeCompare(b.name));}
return sorted;
}

function getFilteredProducts(){
const query=(searchInput.value||"").trim().toLowerCase();
return products.filter(product=>{
const categoryMatch=!activeCategory||product.mainCategory===activeCategory;
const subCategoryMatch=activeCategory!=="wheels"||!activeSubCategory||product.subCategory===activeSubCategory;
const searchMatch=!query||product.name.toLowerCase().includes(query);
return categoryMatch&&subCategoryMatch&&searchMatch&&productPassesFilter(product);
});
}

function renderProducts(){
const filteredProducts=sortProducts(getFilteredProducts());
const selectedCategory=categories.find(category=>category.key===activeCategory);
const selectedSubCategory=wheelSubCategories.find(category=>category.key===activeSubCategory);
const label=selectedSubCategory?`${selectedCategory.label} / ${selectedSubCategory.label}`:(selectedCategory?selectedCategory.label:"All Products");
categorySummary.textContent=`${label} | ${filteredProducts.length} products`;
container.innerHTML="";

if(!filteredProducts.length){
container.innerHTML=`<div class="empty-state">No products found in this category yet</div>`;
return;
}

filteredProducts.forEach(product=>{
container.innerHTML+=`
<div class="card" onclick="openProduct(${product.id})" tabindex="0" role="link" onkeydown="handleCardKey(event,${product.id})">
<img src="${product.image}" alt="${product.name}">
<div class="details">
<h3>${product.name}</h3>
<div class="price">Rs ${product.price.toLocaleString()}</div>
<div class="mrp">MRP ${product.mrp}</div>
<div class="ship">${product.available===false?"Out of stock":"Free Shipping"}</div>
<div class="bottom">
<button class="add" onclick="addToCart(event,${product.id})">Add to cart</button>
</div>
</div>
</div>
`;
});
}

function selectCategory(category){
activeCategory=category;
activeSubCategory="";
const nextUrl=category?`${window.location.pathname}?category=${encodeURIComponent(category)}`:window.location.pathname;
history.pushState({category},"",nextUrl);
renderCategories();
renderProducts();
}

function selectSubCategory(category){
activeSubCategory=category;
const params=new URLSearchParams();
if(activeCategory){params.set("category",activeCategory);}
if(category){params.set("sub",category);}
history.pushState({category:activeCategory,sub:category},"",`${window.location.pathname}?${params.toString()}`);
renderCategories();
renderProducts();
}

window.addEventListener("popstate",()=>{
const params=new URLSearchParams(window.location.search);
activeCategory=params.get("category")||"";
activeSubCategory=params.get("sub")||"";
renderCategories();
renderProducts();
});

function openProduct(id){
window.location=cyclifyProductUrl(id);
}

function handleCardKey(event,id){
if(event.key==="Enter"||event.key===" "){
event.preventDefault();
openProduct(id);
}
}

function addToCart(event,id){
event.stopPropagation();
let cart=JSON.parse(localStorage.getItem("cart"))||[];
let product=products.find(p=>p.id===id);

if(product.sizes&&product.sizes.length){
window.location=cyclifyProductUrl(id);
return;
}

cart.push({
id:product.id,
name:product.name,
price:product.price,
image:product.image,
quantity:1
});

localStorage.setItem("cart",JSON.stringify(cart));
updateCartCount();
window.location.href="cart.html";
}

searchInput.addEventListener("input",renderProducts);
if(sortSelect){sortSelect.addEventListener("change",renderProducts);}
if(filterSelect){filterSelect.addEventListener("change",renderProducts);}
updateCartCount();
renderCategories();
renderProducts();
</script>

<script>
(function(){
const imageButton=document.getElementById("headerImageSearchButton");
const imageInput=document.getElementById("headerImageSearchInput");
if(imageButton&&imageInput){
imageButton.addEventListener("click",()=>imageInput.click());
imageInput.addEventListener("change",()=>{
const file=imageInput.files&&imageInput.files[0];
if(!file){return;}
const reader=new FileReader();
reader.onload=()=>{
sessionStorage.setItem("pendingImageSearchData",reader.result);
window.location.href="index.html#image-search";
};
reader.readAsDataURL(file);
});
}
const globalSearch=document.querySelector("[data-global-search]");
if(globalSearch){
globalSearch.addEventListener("keydown",event=>{
if(event.key!=="Enter"){return;}
const query=globalSearch.value.trim();
if(!query){return;}
sessionStorage.setItem("pendingSearchQuery",query);
window.location.href="index.html";
});
}
const cartCount=document.getElementById("cartCount");
if(cartCount){
const cartItems=JSON.parse(localStorage.getItem("cart"))||[];
const count=cartItems.reduce((total,item)=>total+(item.quantity||1),0);
if(count>0){cartCount.textContent=count;cartCount.style.display="flex";}
else{cartCount.style.display="none";}
}
})();
</script>
