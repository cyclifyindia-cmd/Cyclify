<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wheels & Tyres | Cyclify</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f5f5f5;padding-bottom:80px}
.topbar{position:sticky;top:0;background:white;display:flex;align-items:center;gap:10px;padding:8px 12px;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:1000}
.home-logo{display:flex;align-items:center;justify-content:center;text-decoration:none;width:92px;height:38px;overflow:hidden;border-radius:0;background:transparent;flex:0 0 auto}
.home-logo img{width:100%;height:100%;display:block;object-fit:contain}
.search-box{flex:1 1 auto;min-width:0;position:relative;display:flex;align-items:center;background:#f2f2f2;border-radius:999px;height:46px;overflow:hidden}
.search-box input{width:100%;min-width:0;height:46px;padding:0 10px 0 16px;border:none;outline:none;border-radius:999px 0 0 999px;background:transparent;font-size:15px}.image-search-btn{width:40px;height:40px;margin-right:4px;border:none;border-radius:50%;background:white;font-size:19px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.08);flex:0 0 auto}
.top-icons{display:flex;align-items:center;gap:15px;font-size:24px;flex:0 0 auto}
.top-icons a{text-decoration:none;color:black;position:relative}
.cart-count{position:absolute;top:-8px;right:-10px;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:#ff2a2a;color:white;font-size:11px;font-weight:bold;display:none;align-items:center;justify-content:center}
.page-title{padding:10px 15px 8px;font-size:20px;font-weight:bold;background:#f5f5f5;display:flex;align-items:center;justify-content:space-between;gap:10px}
.page-title span{font-size:12px;color:#666;font-weight:bold;white-space:nowrap}
.category-strip,.sub-category-strip{background:white;border-bottom:1px solid #e8e8e8;padding:8px 12px 12px;overflow-x:auto;display:flex;gap:14px;scroll-snap-type:x mandatory}
.sub-category-strip{display:none;padding-top:8px}
.sub-category-strip.active{display:flex}
.category-pill{min-width:96px;border:none;background:white;padding:0;display:flex;flex-direction:column;align-items:center;gap:7px;font-size:12px;font-weight:bold;color:#222;cursor:pointer;scroll-snap-align:start;position:relative}
.category-icon{width:70px;height:58px;border-radius:14px;background:#eef5ff;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:inset 0 0 0 1px rgba(0,0,0,.04)}
.category-icon img{width:100%;height:100%;object-fit:contain;padding:6px}
.category-pill.active{color:#0039a6}
.category-pill.active::after{content:"";position:absolute;bottom:-10px;width:44px;height:4px;border-radius:8px;background:#0039a6}
.category-summary{padding:12px 15px;background:#f5f5f5;font-size:14px;font-weight:bold;color:#333}
.products{display:grid;grid-template-columns:repeat(2,1fr);gap:0}
.card{background:white;border-right:1px solid #eee;border-bottom:1px solid #eee;cursor:pointer;transition:transform .18s ease,box-shadow .18s ease}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(0,0,0,.08)}
.card img{width:100%;height:155px;object-fit:contain;background:white;padding:8px 8px 2px}
.details{padding:6px 10px 10px}
.details h3{font-size:15px;line-height:1.25;min-height:38px;margin-bottom:6px}
.price{font-size:20px;font-weight:bold;margin-bottom:2px}
.mrp{font-size:14px;color:gray;margin-bottom:6px}
.ship{font-size:12px;font-weight:bold;color:#087a3d;margin-bottom:10px}
.bottom{display:flex;justify-content:flex-end;align-items:center}
.heart{width:40px;height:40px;border:2px solid #ddd;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.add{padding:10px 12px;border-radius:12px;border:2px solid #ddd;background:white;font-weight:bold;cursor:pointer}
.empty-state{grid-column:1/-1;padding:35px 20px;text-align:center;background:white;font-weight:bold;color:#555}
.bottom-nav{position:fixed;bottom:0;left:0;width:100%;height:58px;background:white;border-top:1px solid #ddd;display:flex;z-index:999}
.nav-item{flex:1;text-align:center;padding-top:8px;font-size:14px;font-weight:bold;cursor:pointer}
html{scroll-behavior:smooth}
body{animation:pageFade .45s ease both}
.search-box,.site-search,.category-pill,.add{transition:box-shadow .28s ease,transform .28s ease,background .28s ease,border-color .28s ease}
.image-search-btn{width:74px!important;height:38px!important;display:flex;align-items:center;justify-content:center;gap:5px;border:1px solid rgba(0,57,166,.14)!important;background:linear-gradient(135deg,#ffffff 0%,#eaf2ff 55%,#d9e9ff 100%)!important;color:#0039a6;font-size:17px!important;font-weight:800;letter-spacing:0;box-shadow:0 6px 16px rgba(0,57,166,.14),inset 0 1px 0 rgba(255,255,255,.8)!important}
.image-search-btn::after{content:"Lens";font-size:12px;line-height:1}
.image-search-btn:hover,.add:hover,.category-pill:hover{transform:translateY(-1px)}
.products{animation:catalogFade .38s ease both}
.card{animation:cardSettle .42s ease both}
@keyframes pageFade{from{opacity:.92}to{opacity:1}}
@keyframes catalogFade{from{opacity:.55;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardSettle{from{opacity:.75;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){.image-search-btn{width:46px!important;height:36px!important;font-size:16px!important}.image-search-btn::after{display:none}}
</style>
</head>
<body>
<div class="topbar">
<a href="index.html" class="home-logo"><img src="assets/Logo-dark.png" alt="Cyclify"></a>
<div class="search-box"><input type="text" id="searchInput" placeholder="Search Wheels & Tyres"><button class="image-search-btn" id="headerImageSearchButton" type="button" aria-label="Search by image">&#128247;</button><input type="file" id="headerImageSearchInput" accept="image/*" hidden></div>
<div class="top-icons">
<a href="account.html" aria-label="Account">&#128100;</a>
<a href="cart.html">&#128722;<span class="cart-count" id="cartCount"></span></a>
</div>
</div>

<div class="page-title">🚴 Wheels & Tyres</div>
<div class="category-strip" id="categoryStrip"></div>
<div class="sub-category-strip" id="subCategoryStrip"></div>
<div class="category-summary" id="categorySummary"></div>
<div class="products" id="products"></div>

<div class="bottom-nav">
<div class="nav-item">↕<br>Sort</div>
<div class="nav-item">⚙️<br>Filters</div>
</div>

<script>
const products=[
{
id:37,
name:"Orome Valar TH50D Carbon Road Disc Brake Wheelset",
price:85000,
mrp:"₹85,000",
image:"assets/products/orome-valar-th50d-2.png",
sizes:["Carbon"],
mainCategory:"wheels",
subCategory:"carbon"
}
,
{
id:7,
name:"Cyclami Tubeless Bicycle Presta Valves",
price:999,
mrp:"?1,999",
image:"assets/products/cyclami-presta-valves-1.webp",
sizes:["45mm","65mm","85mm"],
mainCategory:"valve"
},
{
id:30,
name:"Cyclami Ultra-Light TPU Bicycle Tube",
price:999,
mrp:"?1,500",
image:"assets/products/cyclami-tpu-tube-1.webp",
sizes:["700c 23-25","700c 28-32"],
mainCategory:"tubes"
},
{
id:31,
name:"Cyclami Multi-Functional Bicycle Tyre Lever",
price:299,
mrp:"?999",
image:"assets/products/cyclami-tyre-lever-3.webp",
sizes:[],
mainCategory:"tools"
}

];

const categories=[
{key:"wheels",label:"Wheels",image:"assets/products/orome-valar-th50d-2.png"},
{key:"tyres",label:"Tyres",image:"assets/categories/CAT_Wheels.png"},
{key:"tubes",label:"Tubes",image:"assets/products/cyclami-tpu-tube-1.webp"},
{key:"valve",label:"Valve",image:"assets/products/cyclami-presta-valves-1.webp"},
{key:"freehub-body",label:"Freehub Body",image:"assets/categories/CAT_Wheels.png"},
{key:"tools",label:"Tools",image:"assets/products/cyclami-tyre-lever-3.webp"},
{key:"hubs",label:"Hubs",image:"assets/categories/CAT_Wheels.png"}
];

const wheelSubCategories=[
{key:"alloy",label:"Alloy",image:"assets/categories/CAT_Wheels.png"},
{key:"carbon",label:"Carbon",image:"assets/products/orome-valar-th50d-2.png"}
];

const container=document.getElementById("products");
const categoryStrip=document.getElementById("categoryStrip");
const subCategoryStrip=document.getElementById("subCategoryStrip");
const categorySummary=document.getElementById("categorySummary");
const searchInput=document.getElementById("searchInput");
let activeCategory=new URLSearchParams(window.location.search).get("category")||"";
let activeSubCategory=new URLSearchParams(window.location.search).get("sub")||"";

function updateCartCount(){
const cartItems=JSON.parse(localStorage.getItem("cart"))||[];
const count=cartItems.reduce((total,item)=>total+(item.quantity||1),0);
const cartCount=document.getElementById("cartCount");
if(count>0){
cartCount.textContent=count;
cartCount.style.display="flex";
}
else{
cartCount.style.display="none";
}
}

function renderCategories(){
const visibleCategories=categories.filter(category=>
products.some(product=>product.mainCategory===category.key)
);

if(activeCategory&&!visibleCategories.some(category=>category.key===activeCategory)){
activeCategory="";
activeSubCategory="";
}

categoryStrip.innerHTML=visibleCategories.map(category=>`
<button class="category-pill ${category.key===activeCategory?"active":""}" onclick="selectCategory('${category.key}')">
<span class="category-icon"><img src="${category.image}" alt="${category.label}"></span>
<span>${category.label}</span>
</button>
`).join("");

subCategoryStrip.classList.toggle("active",activeCategory==="wheels");
const visibleSubCategories=wheelSubCategories.filter(category=>
products.some(product=>product.mainCategory==="wheels"&&product.subCategory===category.key)
);

if(activeSubCategory&&!visibleSubCategories.some(category=>category.key===activeSubCategory)){
activeSubCategory="";
}

subCategoryStrip.innerHTML=visibleSubCategories.map(category=>`
<button class="category-pill ${category.key===activeSubCategory?"active":""}" onclick="selectSubCategory('${category.key}')">
<span class="category-icon"><img src="${category.image}" alt="${category.label}"></span>
<span>${category.label}</span>
</button>
`).join("");
}

function getFilteredProducts(){
const query=(searchInput.value||"").trim().toLowerCase();
return products.filter(product=>{
const categoryMatch=!activeCategory||product.mainCategory===activeCategory;
const subCategoryMatch=activeCategory!=="wheels"||!activeSubCategory||product.subCategory===activeSubCategory;
const searchMatch=!query||product.name.toLowerCase().includes(query);
return categoryMatch&&subCategoryMatch&&searchMatch;
});
}

function renderProducts(){
const filteredProducts=getFilteredProducts();
const selectedCategory=categories.find(category=>category.key===activeCategory);
const selectedSubCategory=wheelSubCategories.find(category=>category.key===activeSubCategory);
const label=selectedSubCategory?`${selectedCategory.label} / ${selectedSubCategory.label}`:(selectedCategory?selectedCategory.label:"All Products");
categorySummary.textContent=`${label} • ${filteredProducts.length} products`;
container.innerHTML="";

if(!filteredProducts.length){
container.innerHTML=`<div class="empty-state">No products found in this category yet</div>`;
return;
}

filteredProducts.forEach(product=>{
container.innerHTML+=`
<div class="card" onclick="openProduct(${product.id})" tabindex="0" role="link" onkeydown="handleCardKey(event,${product.id})">
<img src="${product.image}" alt="${product.name}">
<div class="details">
<h3>${product.name}</h3>
<div class="price">₹${product.price.toLocaleString()}</div>
<div class="mrp">MRP ${product.mrp}</div>
<div class="ship">Free Shipping</div>
<div class="bottom">
<button class="add" onclick="addToCart(event,${product.id})">Add to cart</button>
</div>
</div>
</div>
`;
});
}

function selectCategory(category){
activeCategory=category;
activeSubCategory="";
const nextUrl=category?`${window.location.pathname}?category=${encodeURIComponent(category)}`:window.location.pathname;
history.pushState({category},"",nextUrl);
renderCategories();
renderProducts();
}

function selectSubCategory(category){
activeSubCategory=category;
const params=new URLSearchParams();
if(activeCategory){params.set("category",activeCategory);}
if(category){params.set("sub",category);}
history.pushState({category:activeCategory,sub:category},"",`${window.location.pathname}?${params.toString()}`);
renderCategories();
renderProducts();
}

window.addEventListener("popstate",()=>{
const params=new URLSearchParams(window.location.search);
activeCategory=params.get("category")||"";
activeSubCategory=params.get("sub")||"";
renderCategories();
renderProducts();
});

function openProduct(id){
window.location=`product.html?id=${id}`;
}

function handleCardKey(event,id){
if(event.key==="Enter"||event.key===" "){
event.preventDefault();
openProduct(id);
}
}

function addToCart(event,id){
event.stopPropagation();
let cart=JSON.parse(localStorage.getItem("cart"))||[];
let product=products.find(p=>p.id===id);

if(product.sizes&&product.sizes.length){
window.location=`product.html?id=${id}`;
return;
}

cart.push({
id:product.id,
name:product.name,
price:product.price,
image:product.image,
quantity:1
});

localStorage.setItem("cart",JSON.stringify(cart));
updateCartCount();
window.location.href="cart.html";
}

searchInput.addEventListener("input",renderProducts);
updateCartCount();
renderCategories();
renderProducts();
</script>

<script>
(function(){
const imageButton=document.getElementById("headerImageSearchButton");
const imageInput=document.getElementById("headerImageSearchInput");
if(imageButton&&imageInput){
imageButton.addEventListener("click",()=>imageInput.click());
imageInput.addEventListener("change",()=>{
const file=imageInput.files&&imageInput.files[0];
if(!file){return;}
const reader=new FileReader();
reader.onload=()=>{
sessionStorage.setItem("pendingImageSearchData",reader.result);
window.location.href="index.html#image-search";
};
reader.readAsDataURL(file);
});
}
const globalSearch=document.querySelector("[data-global-search]");
if(globalSearch){
globalSearch.addEventListener("keydown",event=>{
if(event.key!=="Enter"){return;}
const query=globalSearch.value.trim();
if(!query){return;}
sessionStorage.setItem("pendingSearchQuery",query);
window.location.href="index.html";
});
}
const cartCount=document.getElementById("cartCount");
if(cartCount){
const cartItems=JSON.parse(localStorage.getItem("cart"))||[];
const count=cartItems.reduce((total,item)=>total+(item.quantity||1),0);
if(count>0){cartCount.textContent=count;cartCount.style.display="flex";}
else{cartCount.style.display="none";}
}
})();
</script>

</body>
</html>
