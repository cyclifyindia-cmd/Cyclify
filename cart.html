<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Cart - Cyclify</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

.header{
background:black;
padding:10px 15px;
display:flex;
align-items:center;
gap:15px;
}

.back{
color:white;
font-size:28px;
text-decoration:none;
}

.logo{
height:45px;
}

.cart-container{
padding:15px;
}

.item{

background:white;
padding:15px;
border-radius:12px;
margin-bottom:12px;
display:flex;
gap:15px;
align-items:center;

}

.item img{

width:90px;
height:90px;
object-fit:cover;
border-radius:10px;

}

.info{
flex:1;
}

.price{
color:#0039a6;
font-weight:bold;
margin-top:5px;
}

.quantity{

display:flex;
align-items:center;
gap:12px;
margin-top:10px;

}

.quantity button{

width:30px;
height:30px;
border:none;
border-radius:50%;
background:black;
color:white;
font-size:18px;

}

.checkout{

width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#25D366;
color:white;
font-size:18px;
font-weight:bold;
margin-top:20px;

}

.total{

font-size:22px;
font-weight:bold;
margin:20px 0;

}

</style>

</head>

<body>

<div class="header">

<a
href="javascript:history.back()"
class="back">

←

</a>

<a href="index.html">

<img
src="assets/Logo.png"
class="logo">

</a>

</div>

<div
class="cart-container">

<div
id="cartItems">

</div>

<div
class="total"
id="totalPrice">

</div>

<button
class="checkout"
onclick="checkout()">

Checkout via WhatsApp

</button>

</div>

<script>

let cart=

JSON.parse(

localStorage.getItem(
"cart"
)

)||[];

renderCart();

function renderCart(){

const container=
document.getElementById(
"cartItems"
);

container.innerHTML="";

let total=0;

cart.forEach(

(item,index)=>{

if(!item.quantity){

item.quantity=1;

}

let price=

parseInt(

item.price
.replace(/[₹,]/g,'')

);

total +=
price*
item.quantity;

container.innerHTML +=`

<div class="item">

<img src=
"${item.image}">

<div class="info">

<h3>

${item.name}

</h3>

<div class="price">

${item.price}

</div>

<div
class="quantity">

<button
onclick=
"decrease(${index})">

−

</button>

<span>

${item.quantity}

</span>

<button
onclick=
"increase(${index})">

+

</button>

</div>

</div>

</div>

`;

}

);

document.getElementById(
"totalPrice"
).innerText=

"Total: ₹"+
total.toLocaleString();

localStorage.setItem(
"cart",
JSON.stringify(
cart
)
);

}


function increase(index){

cart[index]
.quantity++;

renderCart();

}


function decrease(index){

if(

cart[index]
.quantity>1

){

cart[index]
.quantity--;

}else{

cart.splice(
index,
1
);

}

renderCart();

}


function checkout(){

let message=

"Hi Cyclify,%0A%0AI want:%0A";

cart.forEach(

item=>{

message +=

item.name+

" x"+

item.quantity+

"%0A";

}

);

window.open(

"https://wa.me/message/MLT2FFSAEYGIP1?text="+message

);

}

</script>

</body>
</html>
