<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Cart - Cyclify</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

.header{
background:black;
padding:10px 15px;
display:flex;
align-items:center;
gap:15px;
}

.back{
color:white;
font-size:28px;
text-decoration:none;
}

.logo{
height:45px;
}

.cart-container{
padding:15px;
}

.item{

background:white;
padding:15px;
border-radius:12px;
margin-bottom:12px;
display:flex;
gap:15px;
align-items:center;

}

.item img{

width:90px;
height:90px;
object-fit:cover;
border-radius:10px;

}

.info{
flex:1;
}

.price{
color:#0039a6;
font-weight:bold;
margin-top:5px;
}

.size{
font-size:13px;
color:#555;
margin-top:5px;
}

.quantity{

display:flex;
align-items:center;
gap:12px;
margin-top:10px;

}

.quantity button{

width:30px;
height:30px;
border:none;
border-radius:50%;
background:black;
color:white;
font-size:18px;

}

.checkout{

width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#25D366;
color:white;
font-size:18px;
font-weight:bold;
margin-top:20px;

}

.total{

font-size:22px;
font-weight:bold;
margin:20px 0;

}

.empty-cart{
background:white;
padding:30px 20px;
border-radius:12px;
text-align:center;
}

.empty-cart h2{
font-size:22px;
margin-bottom:8px;
}

.empty-cart p{
color:#666;
margin-bottom:18px;
}

.shop-link{
display:inline-block;
background:black;
color:white;
text-decoration:none;
padding:12px 18px;
border-radius:10px;
font-weight:bold;
}

.remove{
border:none;
background:#f2f2f2;
color:#333;
padding:8px 12px;
border-radius:8px;
font-weight:bold;
margin-top:10px;
}

.checkout:disabled{
background:#bdbdbd;
cursor:not-allowed;
}

</style>

</head>

<body>

<div class="header">

<a
href="javascript:history.back()"
class="back">

←

</a>

<a href="index.html">

<img
src="assets/Logo.png"
class="logo">

</a>

</div>

<div
class="cart-container">

<div
id="cartItems">

</div>

<div
class="total"
id="totalPrice">

</div>

<button
class="checkout"
onclick="checkout()">

Checkout via WhatsApp

</button>

</div>

<script>

let cart=

JSON.parse(

localStorage.getItem(
"cart"
)

)||[];

renderCart();

function renderCart(){

const container=
document.getElementById(
"cartItems"
);

container.innerHTML="";

const checkoutButton=document.querySelector(".checkout");

if(cart.length===0){

container.innerHTML=`
<div class="empty-cart">
<h2>Your cart is empty</h2>
<p>Add a bike or frame to continue.</p>
<a class="shop-link" href="bikes-frames.html">Shop Bikes</a>
</div>
`;

document.getElementById(
"totalPrice"
).innerText="";

checkoutButton.disabled=true;

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

return;

}

checkoutButton.disabled=false;

let total=0;

cart.forEach(

(item,index)=>{

if(!item.quantity){

item.quantity=1;

}

let price=

typeof item.price==="number"?
item.price:
Number(String(item.price).replace(/[₹,]/g,""));

total +=
price*
item.quantity;

container.innerHTML +=`

<div class="item">

<img src=
"${item.image}">

<div class="info">

<h3>

${item.name}

</h3>

<div class="price">

₹${price.toLocaleString()}

</div>

${item.size?`
<div class="size">
Size: ${item.size}
</div>
`:""}

<button
class="remove"
onclick="removeItem(${index})">
Remove
</button>

<div
class="quantity">

<button
onclick=
"decrease(${index})">

−

</button>

<span>

${item.quantity}

</span>

<button
onclick=
"increase(${index})">

+

</button>

</div>

</div>

</div>

`;

}

);

document.getElementById(
"totalPrice"
).innerText=

"Total: ₹"+
total.toLocaleString();

localStorage.setItem(
"cart",
JSON.stringify(
cart
)
);

}


function increase(index){

cart[index]
.quantity++;

renderCart();

}


function decrease(index){

if(

cart[index]
.quantity>1

){

cart[index]
.quantity--;

}else{

cart.splice(
index,
1
);

}

renderCart();

}


function removeItem(index){

cart.splice(
index,
1
);

renderCart();

}


function checkout(){

if(cart.length===0){
return;
}

let total=0;

let lines=[
"Hi Cyclify,",
"",
"I want to order:"
];

cart.forEach(

item=>{

let price=
typeof item.price==="number"?
item.price:
Number(String(item.price).replace(/[₹,]/g,""));

let lineTotal=
price*
item.quantity;

total +=
lineTotal;

lines.push(

item.name+

(
item.size?
" | Size: "+item.size:
""
)+

" | Qty: "+

item.quantity+

" | ₹"+

lineTotal.toLocaleString()

);

}

);

lines.push(
"",
"Total: ₹"+total.toLocaleString()
);

let message=
encodeURIComponent(
lines.join("\n")
);

window.open(

"https://wa.me/message/MLT2FFSAEYGIP1?text="+message

);

}

</script>

</body>
</html>
