<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Cart | Cyclify</title>

<meta name="description" content="Review products added to your Cyclify cart.">
<meta name="robots" content="noindex,follow">
<link rel="canonical" href="https://cyclify.in/cart.html">
<meta property="og:site_name" content="Cyclify">
<meta property="og:title" content="Cart | Cyclify">
<meta property="og:description" content="Review products added to your Cyclify cart.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://cyclify.in/cart.html">
<meta property="og:image" content="https://cyclify.in/assets/Logo-dark-preview.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Cart | Cyclify">
<meta name="twitter:description" content="Review products added to your Cyclify cart.">
<meta name="twitter:image" content="https://cyclify.in/assets/Logo-dark-preview.png">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

.header{
background:black;
padding:10px 15px;
display:flex;
align-items:center;
gap:15px;
}

.back{
color:white;
font-size:28px;
text-decoration:none;
}

.logo{
height:45px;
}

.cart-container{
padding:15px;
}

.item{

background:white;
padding:15px;
border-radius:12px;
margin-bottom:12px;
display:flex;
gap:15px;
align-items:center;

}

.item img{

width:90px;
height:90px;
object-fit:cover;
border-radius:10px;

}

.info{
flex:1;
}

.price{
color:#0039a6;
font-weight:bold;
margin-top:5px;
}

.size{
font-size:13px;
color:#555;
margin-top:5px;
}

.quantity{

display:flex;
align-items:center;
gap:12px;
margin-top:10px;

}

.quantity button{

width:30px;
height:30px;
border:none;
border-radius:50%;
background:black;
color:white;
font-size:18px;

}

.checkout{

width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#25D366;
color:white;
font-size:18px;
font-weight:bold;
margin-top:20px;

}

.total{

font-size:22px;
font-weight:bold;
margin:20px 0;

}

.empty-cart{
background:white;
padding:30px 20px;
border-radius:12px;
text-align:center;
}

.empty-cart h2{
font-size:22px;
margin-bottom:8px;
}

.empty-cart p{
color:#666;
margin-bottom:18px;
}

.shop-link{
display:inline-block;
background:black;
color:white;
text-decoration:none;
padding:12px 18px;
border-radius:10px;
font-weight:bold;
}

.remove{
border:none;
background:#f2f2f2;
color:#333;
padding:8px 12px;
border-radius:8px;
font-weight:bold;
margin-top:10px;
}

.checkout:disabled{
background:#bdbdbd;
cursor:not-allowed;
}


.topbar{
position:sticky;
top:0;
background:white;
display:flex;
align-items:center;
gap:10px;
padding:8px 12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);
z-index:1000;
}
.home-logo{
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
width:92px;
height:38px;
overflow:hidden;
flex:0 0 auto;
}
.home-logo img{width:100%;height:100%;display:block;object-fit:contain;}
.site-search{
flex:1 1 auto;
min-width:0;
position:relative;
display:flex;
align-items:center;
background:#f2f2f2;
border-radius:999px;
height:46px;
overflow:hidden;
}
.site-search input{
width:100%;
min-width:0;
height:46px;
padding:0 10px 0 16px;
border:none;
outline:none;
border-radius:999px 0 0 999px;
background:transparent;
font-size:15px;
}
.image-search-btn{
width:40px;
height:40px;
margin-right:4px;
border:none;
border-radius:50%;
background:white;
font-size:19px;
cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,.08);
flex:0 0 auto;
}
.top-icons{display:flex;gap:15px;font-size:24px;align-items:center;flex:0 0 auto;}
.top-icons a{text-decoration:none;color:black;position:relative;}
.cart-count{position:absolute;top:-8px;right:-10px;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:#ff2a2a;color:white;font-size:11px;font-weight:bold;display:none;align-items:center;justify-content:center;}
@media(max-width:480px){.topbar{gap:7px;padding:7px 8px}.home-logo{width:82px;height:34px}.site-search input{padding:11px;font-size:13px}.image-search-btn{width:34px;height:34px;font-size:15px}.top-icons{gap:10px;font-size:21px}}
html{scroll-behavior:smooth}
body{animation:pageFade .45s ease both}
.site-search,.image-search-btn,.checkout,.qty button,.remove{transition:box-shadow .28s ease,transform .28s ease,background .28s ease,border-color .28s ease}
.image-search-btn{width:74px!important;height:38px!important;display:flex;align-items:center;justify-content:center;gap:5px;border:1px solid rgba(0,57,166,.14)!important;background:linear-gradient(135deg,#ffffff 0%,#eaf2ff 55%,#d9e9ff 100%)!important;color:#0039a6;font-size:17px!important;font-weight:800;letter-spacing:0;box-shadow:0 6px 16px rgba(0,57,166,.14),inset 0 1px 0 rgba(255,255,255,.8)!important}
.image-search-btn::after{content:"";font-size:12px;line-height:1}
.image-search-btn:hover,.checkout:hover,.qty button:hover,.remove:hover{transform:translateY(-1px)}
@keyframes pageFade{from{opacity:.92}to{opacity:1}}
@media(max-width:480px){.image-search-btn{width:46px!important;height:36px!important;font-size:16px!important}.image-search-btn::after{display:none}}



/* Modern Shopify-style header */
.header,
.topbar{
background:rgba(255,255,255,.94)!important;
backdrop-filter:saturate(180%) blur(16px);
-webkit-backdrop-filter:saturate(180%) blur(16px);
border-bottom:1px solid rgba(17,24,39,.08);
box-shadow:0 8px 24px rgba(15,23,42,.06)!important;
min-height:64px;
padding:9px 14px!important;
gap:12px!important;
}

.logo,
.home-logo{
width:96px!important;
height:42px!important;
object-fit:contain;
flex:0 0 auto!important;
}

.home-logo img{
width:100%;
height:100%;
object-fit:contain;
}

.search,
.search-box,
.site-search{
min-width:0;
}

.search{
flex:1 1 auto;
max-width:760px!important;
}

.search-box,
.site-search{
height:46px!important;
border-radius:999px!important;
background:#f6f7f9!important;
border:1px solid #e6e8ed;
box-shadow:inset 0 1px 0 rgba(255,255,255,.78);
overflow:hidden;
display:flex;
align-items:center;
}

.search-box:focus-within,
.site-search:focus-within{
background:white!important;
border-color:#0f172a;
box-shadow:0 0 0 3px rgba(15,23,42,.08)!important;
}

.search-box input,
.site-search input{
height:44px!important;
padding:0 12px 0 17px!important;
font-size:14px!important;
color:#111827;
}

.image-search-btn{
width:42px!important;
height:42px!important;
margin-right:2px!important;
border:0!important;
border-left:1px solid #e7eaf0!important;
border-radius:0 999px 999px 0!important;
background:transparent!important;
color:#111827!important;
box-shadow:none!important;
display:flex!important;
align-items:center!important;
justify-content:center!important;
gap:0!important;
font-size:0!important;
transition:background .22s ease,color .22s ease,transform .22s ease!important;
}

.image-search-btn::after{
content:""!important;
display:none!important;
}

.image-search-btn svg,
.header-icon svg{
width:21px;
height:21px;
fill:none;
stroke:currentColor;
stroke-width:1.9;
stroke-linecap:round;
stroke-linejoin:round;
display:block;
}

.image-search-btn:hover{
background:#eceff4!important;
transform:none!important;
}

.icons,
.top-icons{
display:flex!important;
align-items:center!important;
gap:8px!important;
font-size:0!important;
flex:0 0 auto!important;
}

.icons a,
.top-icons a,
.header-icon{
width:42px;
height:42px;
border-radius:50%;
display:flex!important;
align-items:center!important;
justify-content:center!important;
background:#f6f7f9;
border:1px solid #e6e8ed;
color:#111827!important;
text-decoration:none!important;
position:relative;
box-shadow:0 1px 0 rgba(255,255,255,.9);
transition:background .22s ease,border-color .22s ease,transform .22s ease,box-shadow .22s ease;
}

.icons a:hover,
.top-icons a:hover,
.header-icon:hover{
background:white;
border-color:#d6dbe5;
transform:translateY(-1px);
box-shadow:0 8px 18px rgba(15,23,42,.08);
}

.cart-count{
top:-5px!important;
right:-4px!important;
min-width:17px!important;
height:17px!important;
padding:0 5px!important;
font-size:10px!important;
background:#111827!important;
border:2px solid white;
}

@media(max-width:560px){
.header,
.topbar{
min-height:58px;
padding:8px 9px!important;
gap:7px!important;
}

.logo,
.home-logo{
width:78px!important;
height:36px!important;
}

.search-box,
.site-search{
height:40px!important;
}

.search-box input,
.site-search input{
height:38px!important;
font-size:13px!important;
padding-left:12px!important;
}

.image-search-btn,
.icons a,
.top-icons a,
.header-icon{
width:38px!important;
height:38px!important;
}

.image-search-btn svg,
.header-icon svg{
width:19px;
height:19px;
}

.icons,
.top-icons{
gap:5px!important;
}
}

</style>

</head>

<body>

<div class="topbar">
<a href="index.html" class="home-logo"><img src="assets/Logo-dark.png" alt="Cyclify"></a>
<div class="site-search"><input type="text" placeholder="Search Cyclify" data-global-search><button class="image-search-btn" id="headerImageSearchButton" type="button" aria-label="Search by image"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.2 7.2h2.1l1.4-2h4.6l1.4 2h2.1c1.4 0 2.4 1 2.4 2.4v7.2c0 1.4-1 2.4-2.4 2.4H6.2c-1.4 0-2.4-1-2.4-2.4V9.6c0-1.4 1-2.4 2.4-2.4Z"/><path d="M12 16.2a3.4 3.4 0 1 0 0-6.8 3.4 3.4 0 0 0 0 6.8Z"/><path d="M17.3 10h.1"/></svg></button><input type="file" id="headerImageSearchInput" accept="image/*" hidden></div>
<div class="top-icons">
<a href="account.html" aria-label="Account" class="header-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 20.2c0-3.1-3.6-5.2-8-5.2s-8 2.1-8 5.2"/><path d="M12 12a4.2 4.2 0 1 0 0-8.4 4.2 4.2 0 0 0 0 8.4Z"/></svg></a>
<a href="cart.html" aria-label="Cart" class="header-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h2.2l1.6 9.4c.2 1 1 1.6 2 1.6h6.9c.9 0 1.7-.6 2-1.5L20 8H7.1"/><path d="M10 20h.1"/><path d="M17 20h.1"/></svg><span class="cart-count" id="cartCount"></span></a>
</div>
</div>


<script>
(function(){
const imageButton=document.getElementById("headerImageSearchButton");
const imageInput=document.getElementById("headerImageSearchInput");
if(imageButton&&imageInput){
imageButton.addEventListener("click",()=>imageInput.click());
imageInput.addEventListener("change",()=>{
const file=imageInput.files&&imageInput.files[0];
if(!file){return;}
const reader=new FileReader();
reader.onload=()=>{
sessionStorage.setItem("pendingImageSearchData",reader.result);
window.location.href="index.html#image-search";
};
reader.readAsDataURL(file);
});
}
const globalSearch=document.querySelector("[data-global-search]");
if(globalSearch){
globalSearch.addEventListener("keydown",event=>{
if(event.key!=="Enter"){return;}
const query=globalSearch.value.trim();
if(!query){return;}
sessionStorage.setItem("pendingSearchQuery",query);
window.location.href="index.html";
});
}
const cartCount=document.getElementById("cartCount");
if(cartCount){
const cartItems=JSON.parse(localStorage.getItem("cart"))||[];
const count=cartItems.reduce((total,item)=>total+(item.quantity||1),0);
if(count>0){cartCount.textContent=count;cartCount.style.display="flex";}
else{cartCount.style.display="none";}
}
})();
</script>

<div
class="cart-container">

<div
id="cartItems">

</div>

<div
class="total"
id="totalPrice">

</div>

<button
class="checkout"
onclick="checkout()">

Buy Now

</button>

</div>

<script>

let cart=

JSON.parse(

localStorage.getItem(
"cart"
)

)||[];

renderCart();

function renderCart(){

const container=
document.getElementById(
"cartItems"
);

container.innerHTML="";

const checkoutButton=document.querySelector(".checkout");

if(cart.length===0){

container.innerHTML=`
<div class="empty-cart">
<h2>Your cart is empty</h2>
<p>Add a bike or frame to continue.</p>
<a class="shop-link" href="bikes-frames.html">Shop Bikes</a>
</div>
`;

document.getElementById(
"totalPrice"
).innerText="";

checkoutButton.disabled=true;

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

return;

}

checkoutButton.disabled=false;

let total=0;

cart.forEach(

(item,index)=>{

if(!item.quantity){

item.quantity=1;

}

let price=

typeof item.price==="number"?
item.price:
Number(String(item.price).replace(/[^0-9.]/g,""));

total +=
price*
item.quantity;

container.innerHTML +=`

<div class="item">

<img src=
"${item.image}">

<div class="info">

<h3>

${item.name}

</h3>

<div class="price">

Rs ${price.toLocaleString()}

</div>

${item.size?`
<div class="size">
Size: ${item.size}
</div>
`:""}

${item.valveLength?`
<div class="size">
${item.optionLabel||"Valve Length"}: ${item.valveLength}
</div>
`:""}

<button
class="remove"
onclick="removeItem(${index})">
Remove
</button>

<div
class="quantity">

<button
onclick=
"decrease(${index})">

-

</button>

<span>

${item.quantity}

</span>

<button
onclick=
"increase(${index})">

+

</button>

</div>

</div>

</div>

`;

}

);

document.getElementById(
"totalPrice"
).innerText=

"Total: Rs "+
total.toLocaleString();

localStorage.setItem(
"cart",
JSON.stringify(
cart
)
);

}


function increase(index){

cart[index]
.quantity++;

renderCart();

}


function decrease(index){

if(

cart[index]
.quantity>1

){

cart[index]
.quantity--;

}else{

cart.splice(
index,
1
);

}

renderCart();

}


function removeItem(index){

cart.splice(
index,
1
);

renderCart();

}


function checkout(){
alert("Buy Now is cooking. Online orders will open soon on Cyclify.");
}

</script>

</body>
</html>
