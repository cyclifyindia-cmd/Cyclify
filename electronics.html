body{

.topbar{
position:sticky;
top:0;
background:white;
display:flex;
align-items:center;
gap:10px;
padding:8px 12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);

}

.home-logo{
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
width:68px;
height:44px;
overflow:hidden;
border-radius:8px;
background:black;

}

.home-logo img{
width:100%;
height:100%;
display:block;
object-fit:cover;
}

.search-box{
flex:1;
}

.search-box input{
width:100%;
padding:13px;
border:none;
outline:none;
border-radius:30px;
background:#f2f2f2;
font-size:15px;
}

.top-icons{
display:flex;
gap:15px;
font-size:24px;
}

.top-icons a{
text-decoration:none;
color:black;
position:relative;
}

.cart-count{
position:absolute;
top:-8px;
right:-10px;
min-width:18px;
height:18px;
padding:0 5px;
border-radius:9px;
background:#ff2a2a;
color:white;
font-size:11px;
font-weight:bold;
display:none;
align-items:center;
justify-content:center;
}

.page-title{
padding:20px;
font-size:30px;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:0;
}

.card{
background:white;
border-right:1px solid #eee;
border-bottom:1px solid #eee;
cursor:pointer;
transition:transform .18s ease, box-shadow .18s ease;
}

.card:hover{
transform:translateY(-2px);
box-shadow:0 8px 18px rgba(0,0,0,.08);
}

.card img{
width:100%;
height:155px;
object-fit:contain;
background:white;
padding:8px 8px 2px;
cursor:pointer;
}

.details{
padding:6px 10px 10px;
}

.details h3{
font-size:15px;
line-height:1.25;
min-height:38px;
margin-bottom:6px;
}

.price{
font-size:20px;
font-weight:bold;
margin-bottom:2px;
}

.mrp{
font-size:14px;
color:gray;
margin-bottom:12px;
}

.bottom{
display:flex;
justify-content:space-between;
align-items:center;
}

.heart{
width:40px;
height:40px;
border:2px solid #ddd;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

.add{
padding:10px 12px;
border-radius:12px;
border:2px solid #ddd;
background:white;
font-weight:bold;
cursor:pointer;
}
</style>

const container=document.getElementById("products");

function updateCartCount(){
const cartItems=JSON.parse(localStorage.getItem("cart"))||[];
const count=cartItems.reduce((total,item)=>total+(item.quantity||1),0);
const cartCount=document.getElementById("cartCount");

if(count>0){
cartCount.textContent=count;
cartCount.style.display="flex";
}
else{
cartCount.style.display="none";
}
}

updateCartCount();

products.forEach(product=>{
container.innerHTML+=`
<div class="card"
onclick="openProduct(${product.id})"
tabindex="0"
role="link"
onkeydown="handleCardKey(event,${product.id})">
<img src="${product.image}">
<div class="details">
<h3>${product.name}</h3>
<div class="price">₹${product.price.toLocaleString()}</div>
<div class="mrp">MRP ${product.mrp}</div>
<div class="bottom">
<div class="heart">♡</div>
<button class="add" onclick="addToCart(event,${product.id})">Add to cart</button>
</div>
</div>
</div>
`;
});

function openProduct(id){
window.location=`product.html?id=${id}`;
}

function handleCardKey(event,id){
if(event.key==="Enter"||event.key===" "){
event.preventDefault();
openProduct(id);
}
}

function addToCart(event,id){
event.stopPropagation();

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let product=products.find(p=>p.id===id);

if(product.sizes&&product.sizes.length){
window.location=`product.html?id=${id}`;
return;
}

let existing=cart.find(item=>item.id===id);

if(existing){
existing.quantity++;
}
else{
cart.push({
id:product.id,
name:product.name,
price:product.price,
image:product.image,
quantity:1
});
}

localStorage.setItem("cart",JSON.stringify(cart));
updateCartCount();
window.location.href="cart.html";
}
