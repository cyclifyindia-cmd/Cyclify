const container=document.getElementById("products");
const categoryStrip=document.getElementById("categoryStrip");
const categorySummary=document.getElementById("categorySummary");
const searchInput=document.getElementById("searchInput");
const sortSelect=document.getElementById("sortSelect");
const filterSelect=document.getElementById("filterSelect");
let activeCategory=new URLSearchParams(window.location.search).get("category")||"";

const categories=[
{key:"smart-trainer",label:"Smart Trainer",image:"assets/products/thinkrider-x2-max-1.jpg"},
{key:"bike-computer",label:"Bike Computer",image:"assets/products/cat-bike-computer.png"},
{key:"lights",label:"Lights",image:"assets/products/cat-lights.png"},
{key:"electric-pump",label:"Electric Pump",image:"assets/products/cat-electric-pump.png"},
{key:"power-meter",label:"Power Meter",image:"assets/products/cat-power-meter.png"},
{key:"sensors",label:"Sensors",image:"assets/products/cyclami-c1-sensor-1.webp"},
{key:"wireless-groupset",label:"Electric Groupset",image:"assets/products/cat-wireless-groupset.png"}
];

function getProductCategory(product){
const name=product.name.toLowerCase();

if(name.includes("trainer")){
return "smart-trainer";
}

if(name.includes("virtual shifting")){
return "smart-trainer";
}

if(name.includes("pump")){
return "electric-pump";
}

if(name.includes("light")||name.includes("headlight")||name.includes("taillight")){
return "lights";
}

if(name.includes("sensor")||name.includes("cadence")||name.includes("speed")||name.includes("heart rate")){
return "sensors";
}

if(name.includes("mount")||name.includes("holder")||name.includes("pulley")||name.includes("cage")||name.includes("lever")||name.includes("tool")){
return "";
}

if(name.includes("computer")){
return "bike-computer";
}

if(name.includes("power meter")){
return "power-meter";
}

if(name.includes("wireless groupset")){
return "wireless-groupset";
}

return "";
}

function updateCartCount(){
const cartItems=JSON.parse(localStorage.getItem("cart"))||[];
const count=cartItems.reduce((total,item)=>total+(item.quantity||1),0);
const cartCount=document.getElementById("cartCount");

if(count>0){
cartCount.textContent=count;
cartCount.style.display="flex";
}
else{
cartCount.style.display="none";
}
}

updateCartCount();

products.forEach(product=>{
container.innerHTML+=`
<div class="card"
onclick="openProduct(${product.id})"
tabindex="0"
role="link"
onkeydown="handleCardKey(event,${product.id})">
<img src="${product.image}">
<div class="details">
<h3>${product.name}</h3>
<div class="price">Rs ${product.price.toLocaleString()}</div>
<div class="mrp">MRP ${product.mrp}</div>
<div class="ship">Free Shipping</div>
<div class="bottom">
<button class="add" onclick="addToCart(event,${product.id})">Add to cart</button>
</div>
</div>
</div>
`;
});

function renderCategories(){
const visibleCategories=categories.filter(category=>
products.some(product=>getProductCategory(product)===category.key)
);

if(activeCategory&&!visibleCategories.some(category=>category.key===activeCategory)){
activeCategory="";
}

categoryStrip.innerHTML=visibleCategories.map(category=>`
<button class="category-pill ${category.key===activeCategory?"active":""}" onclick="selectCategory('${category.key}')">
<span class="category-icon"><img src="${category.image}" alt="${category.label}"></span>
<span>${category.label}</span>
</button>
`).join("");
}

function productPassesFilter(product){
const selected=filterSelect?filterSelect.value:"all";
const price=Number(product.price)||0;
if(selected==="under-5000"){return price<5000;}
if(selected==="5000-20000"){return price>=5000&&price<=20000;}
if(selected==="above-20000"){return price>20000;}
return true;
}

function sortProducts(list){
const selected=sortSelect?sortSelect.value:"featured";
const sorted=[...list];
if(selected==="price-low"){sorted.sort((a,b)=>(Number(a.price)||0)-(Number(b.price)||0));}
else if(selected==="price-high"){sorted.sort((a,b)=>(Number(b.price)||0)-(Number(a.price)||0));}
else if(selected==="name"){sorted.sort((a,b)=>a.name.localeCompare(b.name));}
return sorted;
}

function getFilteredProducts(){
const query=(searchInput.value||"").trim().toLowerCase();

return products.filter(product=>{
const categoryMatch=!activeCategory||getProductCategory(product)===activeCategory;
const searchMatch=!query||product.name.toLowerCase().includes(query);
return categoryMatch&&searchMatch&&productPassesFilter(product);
});
}

function renderProducts(){
const filteredProducts=sortProducts(getFilteredProducts());
const selectedCategory=categories.find(category=>category.key===activeCategory);
const categoryLabel=selectedCategory?selectedCategory.label:"All Products";
categorySummary.textContent=`${categoryLabel} | ${filteredProducts.length} products`;
container.innerHTML="";

if(!filteredProducts.length){
container.innerHTML=`<div class="empty-state">No products found in this category yet</div>`;
return;
}

filteredProducts.forEach(product=>{
container.innerHTML+=`
<div class="card"
onclick="openProduct(${product.id})"
tabindex="0"
role="link"
onkeydown="handleCardKey(event,${product.id})">
<img src="${product.image}">
<div class="details">
<h3>${product.name}</h3>
<div class="price">Rs ${product.price.toLocaleString()}</div>
<div class="mrp">MRP ${product.mrp}</div>
<div class="ship">Free Shipping</div>
<div class="bottom">
<button class="add" onclick="addToCart(event,${product.id})">Add to cart</button>
</div>
</div>
</div>
`;
});
}

function selectCategory(category){
activeCategory=category;
const nextUrl=category?`${window.location.pathname}?category=${encodeURIComponent(category)}`:window.location.pathname;
history.pushState({category},"",nextUrl);
renderCategories();
renderProducts();
}

window.addEventListener("popstate",()=>{
activeCategory=new URLSearchParams(window.location.search).get("category")||"";
renderCategories();
renderProducts();
});

searchInput.addEventListener("input",renderProducts);
if(sortSelect){sortSelect.addEventListener("change",renderProducts);}
if(filterSelect){filterSelect.addEventListener("change",renderProducts);}

renderCategories();
renderProducts();

function openProduct(id){
window.location=cyclifyProductUrl(id);
}

function handleCardKey(event,id){
if(event.key==="Enter"||event.key===" "){
event.preventDefault();
openProduct(id);
}
}

function addToCart(event,id){
event.stopPropagation();

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let product=products.find(p=>p.id===id);

if(product.sizes&&product.sizes.length){
window.location=cyclifyProductUrl(id);
return;
}

let existing=cart.find(item=>item.id===id);

if(existing){
existing.quantity++;
}
else{
cart.push({
id:product.id,
name:product.name,
price:product.price,
image:product.image,
quantity:1
});
}

localStorage.setItem("cart",JSON.stringify(cart));
updateCartCount();
window.location.href="cart.html";
}
</script>


<script>
(function(){
const imageButton=document.getElementById("headerImageSearchButton");
const imageInput=document.getElementById("headerImageSearchInput");
if(imageButton&&imageInput){
imageButton.addEventListener("click",()=>imageInput.click());
imageInput.addEventListener("change",()=>{
const file=imageInput.files&&imageInput.files[0];
if(!file){return;}
const reader=new FileReader();
reader.onload=()=>{
sessionStorage.setItem("pendingImageSearchData",reader.result);
window.location.href="index.html#image-search";
};
reader.readAsDataURL(file);
});
}
const globalSearch=document.querySelector("[data-global-search]");
if(globalSearch){
globalSearch.addEventListener("keydown",event=>{
if(event.key!=="Enter"){return;}
const query=globalSearch.value.trim();
if(!query){return;}
sessionStorage.setItem("pendingSearchQuery",query);
window.location.href="index.html";
});
}
const cartCount=document.getElementById("cartCount");
if(cartCount){
const cartItems=JSON.parse(localStorage.getItem("cart"))||[];
const count=cartItems.reduce((total,item)=>total+(item.quantity||1),0);
if(count>0){cartCount.textContent=count;cartCount.style.display="flex";}
else{cartCount.style.display="none";}
}
})();
</script>
