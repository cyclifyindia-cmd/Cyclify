<title>Electronics | Cyclify</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding-bottom:80px;
}

.topbar{
position:sticky;
top:0;
background:white;
display:flex;
align-items:center;
gap:10px;
padding:8px 12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);

}

.home-logo{
display:flex;
align-items:center;
justify-content:center;
text-decoration:none;
width:92px;
height:38px;
overflow:hidden;
border-radius:0;
background:transparent;
flex-shrink:0;
}

.home-logo img{
width:100%;
height:100%;
display:block;
object-fit:contain;
}

.search-box{
flex:1;
position:relative;
display:flex;
align-items:center;
background:#f2f2f2;
border-radius:30px;
overflow:hidden;
}

.search-box input{
width:100%;
padding:13px;
border:none;
outline:none;
border-radius:30px;
background:transparent;
font-size:15px;
}

.image-search-btn{
width:38px;
height:38px;
margin-right:4px;
border:none;
border-radius:50%;
background:white;
font-size:17px;
cursor:pointer;
box-shadow:0 2px 8px rgba(0,0,0,.08);
flex:0 0 auto;
}

.top-icons{
display:flex;
gap:15px;
font-size:24px;
}

.top-icons a{
text-decoration:none;
color:black;
position:relative;
}

.cart-count{
position:absolute;
top:-8px;
right:-10px;
min-width:18px;
height:18px;
padding:0 5px;
border-radius:9px;
background:#ff2a2a;
color:white;
font-size:11px;
font-weight:bold;
display:none;
align-items:center;
justify-content:center;
}

.page-title{
padding:10px 15px 8px;
font-size:20px;
font-weight:bold;
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
}

.page-title span{
font-size:12px;
color:#666;
font-weight:bold;
white-space:nowrap;
}

.category-strip{
background:white;
border-bottom:1px solid #e8e8e8;
padding:8px 12px 12px;
overflow-x:auto;
display:flex;
gap:14px;
scroll-snap-type:x mandatory;
}

.category-pill{
min-width:96px;
border:none;
background:white;
padding:0;
display:flex;
flex-direction:column;
align-items:center;
gap:7px;
font-size:12px;
font-weight:bold;
color:#222;
cursor:pointer;
scroll-snap-align:start;
position:relative;
}

.category-icon{
width:70px;
height:58px;
border-radius:14px;
background:#eef5ff;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
box-shadow:inset 0 0 0 1px rgba(0,0,0,.04);
}

.category-icon img{
width:100%;
height:100%;
object-fit:contain;
padding:6px;
}

.category-pill.active{
color:#0039a6;
}

.category-pill.active::after{
content:"";
position:absolute;
bottom:-10px;
width:44px;
height:4px;
border-radius:8px;
background:#0039a6;
}

.category-summary{
padding:12px 15px;
background:#f5f5f5;
font-size:14px;
font-weight:bold;
color:#333;
}

.empty-state{
grid-column:1/-1;
padding:35px 20px;
text-align:center;
background:white;
font-weight:bold;
color:#555;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:0;
}

.card{
background:white;
border-right:1px solid #eee;
border-bottom:1px solid #eee;
cursor:pointer;
transition:transform .18s ease, box-shadow .18s ease;
}

.card:hover{
transform:translateY(-2px);
box-shadow:0 8px 18px rgba(0,0,0,.08);
}

.card img{
width:100%;
height:155px;
object-fit:contain;
background:white;
padding:8px 8px 2px;
cursor:pointer;
}

.details{
padding:6px 10px 10px;
}

.details h3{
font-size:15px;
line-height:1.25;
min-height:38px;
margin-bottom:6px;
}

.price{
font-size:20px;
font-weight:bold;
margin-bottom:2px;
}

.mrp{
font-size:14px;
color:gray;
margin-bottom:6px;
}

.ship{
font-size:12px;
font-weight:bold;
color:#087a3d;
margin-bottom:10px;
}

.bottom{
display:flex;
justify-content:space-between;
align-items:center;
}

.heart{
width:40px;
height:40px;
border:2px solid #ddd;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

.add{
padding:10px 12px;
border-radius:12px;
border:2px solid #ddd;
background:white;
font-weight:bold;
cursor:pointer;
}

const container=document.getElementById("products");
const categoryStrip=document.getElementById("categoryStrip");
const categorySummary=document.getElementById("categorySummary");
const searchInput=document.getElementById("searchInput");
let activeCategory="";

const categories=[
{key:"smart-trainer",label:"Smart Trainer",image:"assets/products/thinkrider-x2-max-1.jpg"},
{key:"bike-computer",label:"Bike Computer",image:"assets/products/cat-bike-computer.png"},
{key:"lights",label:"Lights",image:"assets/products/cat-lights.png"},
{key:"electric-pump",label:"Electric Pump",image:"assets/products/cat-electric-pump.png"},
{key:"power-meter",label:"Power Meter",image:"assets/products/cat-power-meter.png"},
{key:"sensors",label:"Sensors",image:"assets/products/cyclami-c1-sensor-1.webp"},
{key:"wireless-groupset",label:"Electric Groupset",image:"assets/products/cat-wireless-groupset.png"}
];

function getProductCategory(product){
const name=product.name.toLowerCase();

if(name.includes("trainer")){
return "smart-trainer";
}

if(name.includes("virtual shifting")){
return "smart-trainer";
}

if(name.includes("pump")){
return "electric-pump";
}

if(name.includes("light")||name.includes("headlight")||name.includes("taillight")){
return "lights";
}

if(name.includes("sensor")||name.includes("cadence")||name.includes("speed")){
return "sensors";
}

if(name.includes("mount")||name.includes("holder")||name.includes("pulley")||name.includes("cage")||name.includes("lever")||name.includes("tool")){
return "";
}

if(name.includes("computer")){
return "bike-computer";
}

if(name.includes("power meter")){
return "power-meter";
}

if(name.includes("wireless groupset")){
return "wireless-groupset";
}

return "";
}

function updateCartCount(){
const cartItems=JSON.parse(localStorage.getItem("cart"))||[];
const count=cartItems.reduce((total,item)=>total+(item.quantity||1),0);
const cartCount=document.getElementById("cartCount");

if(count>0){
cartCount.textContent=count;
cartCount.style.display="flex";
}
else{
cartCount.style.display="none";
}
}

updateCartCount();

products.forEach(product=>{
container.innerHTML+=`
<div class="card"
onclick="openProduct(${product.id})"
tabindex="0"
role="link"
onkeydown="handleCardKey(event,${product.id})">
<img src="${product.image}">
<div class="details">
<h3>${product.name}</h3>
<div class="price">₹${product.price.toLocaleString()}</div>
<div class="mrp">MRP ${product.mrp}</div>
<div class="ship">Free Shipping</div>
<div class="bottom">
<div class="heart" onclick="event.stopPropagation();window.location.href='account.html'">&#128100;</div>
<button class="add" onclick="addToCart(event,${product.id})">Add to cart</button>
</div>
</div>
</div>
`;
});

function renderCategories(){
const visibleCategories=categories.filter(category=>
products.some(product=>getProductCategory(product)===category.key)
);

if(activeCategory&&!visibleCategories.some(category=>category.key===activeCategory)){
activeCategory="";
}

categoryStrip.innerHTML=visibleCategories.map(category=>`
<button class="category-pill ${category.key===activeCategory?"active":""}" onclick="selectCategory('${category.key}')">
<span class="category-icon"><img src="${category.image}" alt="${category.label}"></span>
<span>${category.label}</span>
</button>
`).join("");
}

function getFilteredProducts(){
const query=(searchInput.value||"").trim().toLowerCase();

return products.filter(product=>{
const categoryMatch=!activeCategory||getProductCategory(product)===activeCategory;
const searchMatch=!query||product.name.toLowerCase().includes(query);
return categoryMatch&&searchMatch;
});
}

function renderProducts(){
const filteredProducts=getFilteredProducts();
const selectedCategory=categories.find(category=>category.key===activeCategory);
const categoryLabel=selectedCategory?selectedCategory.label:"All Products";
categorySummary.textContent=`${categoryLabel} • ${filteredProducts.length} products`;
container.innerHTML="";

if(!filteredProducts.length){
container.innerHTML=`<div class="empty-state">No products found in this category yet</div>`;
return;
}

filteredProducts.forEach(product=>{
container.innerHTML+=`
<div class="card"
onclick="openProduct(${product.id})"
tabindex="0"
role="link"
onkeydown="handleCardKey(event,${product.id})">
<img src="${product.image}">
<div class="details">
<h3>${product.name}</h3>
<div class="price">₹${product.price.toLocaleString()}</div>
<div class="mrp">MRP ${product.mrp}</div>
<div class="ship">Free Shipping</div>
<div class="bottom">
<div class="heart" onclick="event.stopPropagation();window.location.href='account.html'">&#128100;</div>
<button class="add" onclick="addToCart(event,${product.id})">Add to cart</button>
</div>
</div>
</div>
`;
});
}

function selectCategory(category){
activeCategory=category;
renderCategories();
renderProducts();
}

searchInput.addEventListener("input",renderProducts);

renderCategories();
renderProducts();

function openProduct(id){
window.location=`product.html?id=${id}`;
}

function handleCardKey(event,id){
if(event.key==="Enter"||event.key===" "){
event.preventDefault();
openProduct(id);
}
}

function addToCart(event,id){
event.stopPropagation();

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let product=products.find(p=>p.id===id);

if(product.sizes&&product.sizes.length){
window.location=`product.html?id=${id}`;
return;
}

let existing=cart.find(item=>item.id===id);

if(existing){
existing.quantity++;
}
else{
cart.push({
id:product.id,
name:product.name,
price:product.price,
image:product.image,
quantity:1
});
}

localStorage.setItem("cart",JSON.stringify(cart));
updateCartCount();
window.location.href="cart.html";
}
</script>


<script>
(function(){
const imageButton=document.getElementById("headerImageSearchButton");
const imageInput=document.getElementById("headerImageSearchInput");
if(imageButton&&imageInput){
imageButton.addEventListener("click",()=>imageInput.click());
imageInput.addEventListener("change",()=>{
const file=imageInput.files&&imageInput.files[0];
if(!file){return;}
const reader=new FileReader();
reader.onload=()=>{
sessionStorage.setItem("pendingImageSearchData",reader.result);
window.location.href="index.html#image-search";
};
reader.readAsDataURL(file);
});
}
const globalSearch=document.querySelector("[data-global-search]");
if(globalSearch){
globalSearch.addEventListener("keydown",event=>{
if(event.key!=="Enter"){return;}
const query=globalSearch.value.trim();
if(!query){return;}
sessionStorage.setItem("pendingSearchQuery",query);
window.location.href="index.html";
});
}
const cartCount=document.getElementById("cartCount");
if(cartCount){
const cartItems=JSON.parse(localStorage.getItem("cart"))||[];
const count=cartItems.reduce((total,item)=>total+(item.quantity||1),0);
if(count>0){cartCount.textContent=count;cartCount.style.display="flex";}
else{cartCount.style.display="none";}
}
})();
</script>
