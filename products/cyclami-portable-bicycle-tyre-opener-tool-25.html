const params=new URLSearchParams(window.location.search);
const productId=Number(window.CYCLIFY_PRODUCT_ID||params.get("id"))||1;
const product=products.find(item=>item.id===productId)||products[0];
let productImages=product.images||[product.image];
let currentImageIndex=0;
let selectedSize=product.sizes&&product.sizes.length?product.sizes[0]:"";
let selectedValveLength=product.valveLengths&&product.valveLengths.length?product.valveLengths[0]:"";
let productAvailableForCart=true;
function absoluteSiteUrl(value){
if(!value){return "https://cyclify.in/assets/Logo-dark-preview.png";}
if(/^https?:\/\//i.test(value)){return value;}
return `https://cyclify.in/${String(value).replace(/^\/+/,"")}`;
}

function plainProductDescription(){
const specs=(product.specs||[]).slice(0,3).join(". ");
return `Buy ${product.name} on Cyclify India. Price INR ${product.price.toLocaleString()}. ${specs}`.slice(0,300);
}

function upsertMeta(selector,create,content){
let element=document.head.querySelector(selector);
if(!element){
element=document.createElement(create.tag);
Object.keys(create.attrs).forEach(key=>element.setAttribute(key,create.attrs[key]));
document.head.appendChild(element);
}
if(create.tag==="link"){element.setAttribute("href",content);}
else{element.setAttribute("content",content);}
return element;
}

function setProductSeo(){
const canonical=absoluteSiteUrl(cyclifyProductUrl(product.id));
const title=`${product.name} | Cyclify`;
const description=plainProductDescription();
const image=absoluteSiteUrl(product.image);
document.title=title;
upsertMeta('meta[name="description"]',{tag:"meta",attrs:{name:"description"}},description);
upsertMeta('link[rel="canonical"]',{tag:"link",attrs:{rel:"canonical"}},canonical);
upsertMeta('meta[property="og:title"]',{tag:"meta",attrs:{property:"og:title"}},title);
upsertMeta('meta[property="og:description"]',{tag:"meta",attrs:{property:"og:description"}},description);
upsertMeta('meta[property="og:url"]',{tag:"meta",attrs:{property:"og:url"}},canonical);
upsertMeta('meta[property="og:image"]',{tag:"meta",attrs:{property:"og:image"}},image);
upsertMeta('meta[name="twitter:title"]',{tag:"meta",attrs:{name:"twitter:title"}},title);
upsertMeta('meta[name="twitter:description"]',{tag:"meta",attrs:{name:"twitter:description"}},description);
upsertMeta('meta[name="twitter:image"]',{tag:"meta",attrs:{name:"twitter:image"}},image);
const brand=(product.name.match(/^(SAVA|ELVES|Cyclami|ThinkRider|Orome|iGPSPORT|MET|Cairbull|ELSIER)/i)||["Cyclify"])[0];
const schema={
"@context":"https://schema.org",
"@type":"Product",
name:product.name,
image:(product.images&&product.images.length?product.images:[product.image]).map(absoluteSiteUrl),
description,
sku:`CYCLIFY-${product.id}`,
brand:{"@type":"Brand",name:brand},
offers:{
"@type":"Offer",
url:canonical,
priceCurrency:"INR",
price:String(product.price),
availability:"https://schema.org/InStock",
itemCondition:"https://schema.org/NewCondition"
}
};
let script=document.getElementById("cyclify-product-schema");
if(!script){
script=document.createElement("script");
script.type="application/ld+json";
script.id="cyclify-product-schema";
document.head.appendChild(script);
}
script.textContent=JSON.stringify(schema);
}

setProductSeo();

const backLink=document.querySelector(".back");
const productGallery=document.getElementById("productGallery");
const hasMultipleImages=productImages.length>1;

if(backLink){
const wheelProductIds=[7,30,31,37];
const wearableProductIds=[48,49,50,51,52,53];
backLink.href=wheelProductIds.includes(product.id)?"wheels-tyres.html":wearableProductIds.includes(product.id)?"wearables.html":product.id>=5?"electronics.html":"bikes-frames.html";
}
productGallery.classList.toggle("single-image",!hasMultipleImages);

function updateCartCount(){

const cartItems=JSON.parse(localStorage.getItem("cart"))||[];
const count=cartItems.reduce((total,item)=>total+(item.quantity||1),0);
const cartCount=document.getElementById("cartCount");

if(count>0){
cartCount.textContent=count;
cartCount.style.display="flex";
}
else{
cartCount.style.display="none";
}

}

updateCartCount();

document.getElementById("productName").textContent=product.name;
document.getElementById("productPrice").textContent=`Rs ${product.price.toLocaleString()}`;
document.getElementById("productMrp").textContent=`MRP ${product.mrp}`;

function normalizeSizeValue(value){
return String(value||"").replace(/\s+/g," ").trim();
}

function getVariantSize(variant){
const values=[variant.option1,variant.option2,variant.option3,variant.public_title,variant.title]
.flatMap(value=>String(value||"").split("/"))
.map(normalizeSizeValue)
.filter(Boolean);
return values.find(value=>product.sizes&&product.sizes.includes(value))||"";
}

function isSizeUnavailable(size){
return product.sizeAvailability&&Object.prototype.hasOwnProperty.call(product.sizeAvailability,size)&&product.sizeAvailability[size]===false;
}

function updateCartButtonForSize(){
productAvailableForCart=!selectedSize||!isSizeUnavailable(selectedSize);
const cartButton=document.querySelector(".cartbtn");
if(cartButton){cartButton.disabled=!productAvailableForCart;}
}

function applySizeAvailability(){
if(!product.sizes||!product.sizes.length){return;}
document.querySelectorAll("#sizeOptions .size-btn").forEach(button=>{
const size=button.dataset.size;
const unavailable=isSizeUnavailable(size);
button.disabled=unavailable;
button.classList.toggle("disabled",unavailable);
});
if(selectedSize&&isSizeUnavailable(selectedSize)){
const nextSize=product.sizes.find(size=>!isSizeUnavailable(size));
selectedSize=nextSize||"";
}
if(selectedSize){selectSize(selectedSize);}
updateCartButtonForSize();
}

function normalizeSourceMoney(value){
const number=Number(value||0);
if(!Number.isFinite(number)||number<=0){return 0;}
return number>100000?Math.round(number/100):Math.round(number);
}

async function fetchSourceProduct(){
const jsUrl=`https://www.cycletimeindia.com/products/${product.sourceHandle}.js`;
const jsonUrl=`https://www.cycletimeindia.com/products/${product.sourceHandle}.json`;
let response=await fetch(jsUrl,{cache:"no-store",mode:"cors"});
if(response.ok){return response.json();}
response=await fetch(jsonUrl,{cache:"no-store",mode:"cors"});
if(!response.ok){throw new Error("source unavailable");}
const data=await response.json();
return data.product||data;
}

async function syncProductStock(){
if(product.stockSource!=="cycletime"||!product.sourceHandle){return;}
try{
const data=await fetchSourceProduct();
const variants=data.variants||[];
const prices=variants.map(variant=>normalizeSourceMoney(variant.price)).filter(Boolean);
const compares=variants.map(variant=>normalizeSourceMoney(variant.compare_at_price)).filter(Boolean);
if(prices.length){
product.price=Math.min(...prices);
document.getElementById("productPrice").textContent=`Rs ${product.price.toLocaleString()}`;
}
if(compares.length){
product.mrp=`Rs ${Math.max(...compares).toLocaleString()}`;
document.getElementById("productMrp").textContent=`MRP ${product.mrp}`;
}
const variantAvailability={};
let hasAvailabilityData=false;
variants.forEach(variant=>{
if(typeof variant.available!=="boolean"){return;}
const size=getVariantSize(variant);
if(!size){return;}
hasAvailabilityData=true;
variantAvailability[size]=(variantAvailability[size]||false)||variant.available;
});
if(hasAvailabilityData){
product.sizeAvailability=variantAvailability;
applySizeAvailability();
}
}
catch(error){}
}

const sizeSection=document.getElementById("sizeSection");
const sizeOptions=document.getElementById("sizeOptions");
const valveSection=document.getElementById("valveSection");
const valveOptions=document.getElementById("valveOptions");

if(product.sizes&&product.sizes.length){

sizeSection.style.display="block";

product.sizes.forEach(size=>{
sizeOptions.innerHTML+=`
<button
class="size-btn"
data-size="${size}"
onclick="selectSize('${size}')">
${size}
</button>
`;
});

}
else{

sizeSection.style.display="none";

}

if(product.valveLengths&&product.valveLengths.length){

valveSection.style.display="block";

product.valveLengths.forEach(length=>{
valveOptions.innerHTML+=`
<button
class="size-btn valve-btn"
onclick="selectValveLength('${length}')">
${length}
</button>
`;
});

}
else{

valveSection.style.display="none";

}

function selectSize(size){

if(isSizeUnavailable(size)){return;}
selectedSize=size;

document.querySelectorAll("#sizeOptions .size-btn").forEach(button=>{
button.classList.toggle("active",button.dataset.size===size);
});
updateCartButtonForSize();

}

if(selectedSize){
selectSize(selectedSize);
}

function selectValveLength(length){

selectedValveLength=length;

document.querySelectorAll(".valve-btn").forEach(button=>{
button.classList.toggle("active",button.textContent.trim()===length);
});

}

if(selectedValveLength){
selectValveLength(selectedValveLength);
}

applySizeAvailability();
syncProductStock();

function showImage(index){

if(!productImages.length){
return;
}

currentImageIndex=(index+productImages.length)%productImages.length;

const image=document.getElementById("productImage");
image.src=productImages[currentImageIndex];
image.alt=product.name;

document.getElementById("imageCount").textContent=
`${currentImageIndex+1}/${productImages.length}`;

document.querySelectorAll(".thumb").forEach((thumb,thumbIndex)=>{
thumb.classList.toggle("active",thumbIndex===currentImageIndex);
});

document.getElementById("productGallery").classList.remove("zoomed");

}

function changeImage(step){
if(!hasMultipleImages){
return;
}
showImage(currentImageIndex+step);
}

const productThumbs=document.getElementById("productThumbs");

productImages.forEach((image,index)=>{
productThumbs.innerHTML+=`
<img
class="thumb"
src="${image}"
alt="${product.name} image ${index+1}"
onclick="showImage(${index})">
`;
});

showImage(0);

let touchStartX=0;

document.getElementById("productGallery").addEventListener("touchstart",event=>{
touchStartX=event.changedTouches[0].screenX;
});

document.getElementById("productGallery").addEventListener("touchend",event=>{

if(!hasMultipleImages){
return;
}

const touchEndX=event.changedTouches[0].screenX;
const swipeDistance=touchEndX-touchStartX;

if(Math.abs(swipeDistance)>45){
changeImage(swipeDistance<0?1:-1);
}

});

document.getElementById("galleryMain").addEventListener("click",()=>{
document.getElementById("productGallery").classList.toggle("zoomed");
});

const specList=document.getElementById("specList");

product.specs.forEach(spec=>{
specList.innerHTML+=`
<div class="spec">
${spec}
</div>
`;
});

const relatedProducts=document.getElementById("relatedProducts");

products
.filter(item=>item.id!==product.id)
.forEach(item=>{
relatedProducts.innerHTML+=`
<a class="related-card" href="${cyclifyProductUrl(item.id)}">
<img src="${item.image}" alt="${item.name}">
<p>${item.name}</p>
</a>
`;
});

function addToCart(){

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let existing=cart.find(item=>
item.id===product.id&&
(item.size||"")===(selectedSize||"")&&
(item.valveLength||"")===(selectedValveLength||"")
);

if(existing){
existing.quantity++;
}
else{
cart.push({
id:product.id,
name:product.name,
price:product.price,
image:product.image,
size:selectedSize,
valveLength:selectedValveLength,
quantity:1
});
}

localStorage.setItem("cart",JSON.stringify(cart));
updateCartCount();
window.location.href="cart.html";

}

function showBuyCooking(){
alert("Buy Now is cooking. Online orders will open soon on Cyclify.");
}

</script>

</body>
</html>
