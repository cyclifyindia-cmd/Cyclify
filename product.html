<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Cyclify Product</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding-bottom:90px;
}

/* HEADER */

.header{

background:black;
padding:12px 15px;

display:flex;
justify-content:space-between;
align-items:center;

position:sticky;
top:0;
z-index:1000;

}

.left{

display:flex;
align-items:center;
gap:15px;

}

.back{

color:white;
text-decoration:none;
font-size:24px;

}

.logo{

color:#ff2a2a;
font-size:22px;
font-weight:bold;

}

.cart{

position:relative;
font-size:24px;
text-decoration:none;
color:white;

}

/* PRODUCT */

.product{

background:white;
padding:20px;

}

.product img{

width:100%;
height:300px;
object-fit:contain;

}

.name{

font-size:28px;
font-weight:bold;
margin-top:15px;

}

.price{

font-size:32px;
font-weight:bold;
margin:10px 0;

}

.mrp{

color:gray;
margin-bottom:20px;

}

/* BUTTONS */

.buttons{

display:flex;
gap:10px;

margin-bottom:20px;

}

.btn{

flex:1;
padding:15px;

border:none;

border-radius:12px;

font-size:16px;
font-weight:bold;

}

.cartbtn{

background:black;
color:white;

}

.buybtn{

background:#25D366;
color:white;

}

/* SECTION */

.section{

background:white;
margin-top:10px;
padding:20px;

}

.spec{

padding:15px;
background:#fafafa;
border-radius:12px;
margin-top:10px;

}

/* RELATED */

.related{

display:flex;
overflow-x:auto;
gap:12px;
margin-top:15px;

}

.related-card{

min-width:140px;

background:#fafafa;

padding:10px;

border-radius:12px;

}

.related-card img{

width:100%;
height:100px;
object-fit:contain;

}

/* FOOTER FEATURES */

.features{

background:white;

margin-top:15px;
padding:20px;

display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;

}

.feature{

text-align:center;

font-size:14px;
font-weight:bold;

}

</style>
</head>

<body>

<div class="header">

<div class="left">

<a href="bikes-frames.html"
class="back">

←

</a>

<div class="logo">

Cyclify

</div>

</div>

<a href="cart.html"
class="cart">

🛒

</a>

</div>

<div class="product">

<img id="productImage">

<div class="name"
id="productName">

</div>

<div class="price"
id="productPrice">

</div>

<div class="mrp">

MRP ₹2,10,000

</div>

<div class="buttons">

<button
class="btn cartbtn">

Add to Cart

</button>

<button
class="btn buybtn">

WhatsApp Buy

</button>

</div>

</div>

<div class="section">

<h3>
Specifications
</h3>

<div class="spec">
Frame : Carbon Fiber
</div>

<div class="spec">
Brakes : Hydraulic Disc
</div>

<div class="spec">
Wheel : 29"
</div>

</div>


<div class="section">

<h3>
Related Products
</h3>

<div class="related">

<div class="related-card">

<img src="assets/products/trek.jpg">

<p>Trek Marlin</p>

</div>

</div>

</div>


<div class="features">

<div class="feature">
✅ Authentic Products
</div>

<div class="feature">
🚚 Fast Delivery
</div>

<div class="feature">
📱 WhatsApp Support
</div>

<div class="feature">
🔒 Secure Shopping
</div>

</div>

</body>
</html>
