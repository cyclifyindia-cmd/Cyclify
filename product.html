<title>Cyclify Product</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding-bottom:90px;
}

/* HEADER */

.header{

background:black;
padding:12px 15px;

display:flex;
justify-content:space-between;
align-items:center;

position:sticky;
top:0;
z-index:1000;

}

.left{

display:flex;
align-items:center;
gap:15px;

}

.back{

color:white;
text-decoration:none;
font-size:24px;

}

.logo{

color:#ff2a2a;
font-size:22px;
font-weight:bold;

}

.cart{

position:relative;
font-size:24px;
text-decoration:none;
color:white;

}

.cart-count{
position:absolute;
top:-8px;
right:-10px;
min-width:18px;
height:18px;
padding:0 5px;
border-radius:9px;
background:#ff2a2a;
color:white;
font-size:11px;
font-weight:bold;
display:none;
align-items:center;
justify-content:center;
}

/* PRODUCT */

.product{

background:#fff;
padding:20px;

}

.gallery{
position:relative;
background:#fff;
overflow:hidden;
touch-action:pan-y;
}

.gallery-main{
width:100%;
height:330px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
cursor:zoom-in;
}

.gallery-main img{

width:100%;
height:100%;
object-fit:contain;
transition:transform .35s ease;

}

.gallery.zoomed .gallery-main img{
transform:scale(1.45);
cursor:zoom-out;

}

.gallery-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
width:38px;
height:38px;
border:none;
border-radius:50%;
background:rgba(0,0,0,.65);
color:white;
font-size:22px;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
z-index:5;
}

.gallery-btn.prev{
left:8px;
}

.gallery-btn.next{
right:8px;
}

.gallery.single-image .gallery-btn,
.gallery.single-image .image-count,
.gallery.single-image + .thumbs{
display:none;
}

.image-count{
position:absolute;
right:10px;
bottom:10px;
background:rgba(0,0,0,.68);
color:white;
font-size:12px;
font-weight:bold;
padding:6px 10px;
border-radius:20px;
}

.thumbs{
display:flex;
gap:8px;
padding:12px 0 4px;
overflow-x:auto;
}

.thumb{
width:62px;
height:52px;
border:2px solid transparent;
border-radius:10px;
background:#fff;
object-fit:cover;
padding:2px;
cursor:pointer;
}

.thumb.active{
border-color:#0039a6;

}

.name{

font-size:28px;
font-weight:bold;
margin-top:15px;

}

.price{

font-size:32px;
font-weight:bold;
margin:10px 0;

}

.mrp{

color:gray;
margin-bottom:20px;

}

.shipping-note{
display:inline-block;
background:#e8f7ef;
color:#087a3d;
font-size:14px;
font-weight:bold;
padding:8px 12px;
border-radius:20px;
margin:0 0 18px;
}

.size-section{
margin:0 0 20px;
}

.size-label{
font-size:14px;
font-weight:bold;
margin-bottom:10px;
}

.size-options{
display:flex;
gap:8px;
overflow-x:auto;
}

.size-btn{
min-width:48px;
height:42px;
border:1px solid #ddd;
border-radius:8px;
background:white;
font-size:15px;
font-weight:bold;
}

.size-btn.active{
background:black;
color:white;
border-color:black;
}

/* BUTTONS */

.buttons{

display:flex;
gap:10px;

margin-bottom:20px;

}

.btn{

flex:1;
padding:15px;

border:none;

border-radius:12px;

font-size:16px;
font-weight:bold;

}

.cartbtn{

background:black;
color:white;

}

.buybtn{

background:#25D366;
color:white;

/* SECTION */

.section{

background:white;
margin-top:10px;
padding:20px;

}

.spec{

padding:15px;
background:#fafafa;
border-radius:12px;
margin-top:10px;

}

/* RELATED */

.related{

display:flex;
overflow-x:auto;
gap:12px;
margin-top:15px;

}

.related-card{

min-width:140px;

background:#fafafa;

padding:10px;

border-radius:12px;
text-decoration:none;
color:black;

}

.related-card img{

width:100%;
height:100px;
object-fit:contain;

/* FOOTER FEATURES */

margin-top:15px;
padding:20px;

display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;

}

.feature{

text-align:center;

font-size:14px;
font-weight:bold;

}


.topbar{
position:sticky;
top:0;
background:white;
display:flex;
align-items:center;
gap:10px;
padding:8px 12px;
box-shadow:0 2px 8px rgba(0,0,0,.1);

align-items:center;
justify-content:center;

width:92px;
height:38px;
overflow:hidden;
flex-shrink:0;

.home-logo img{width:100%;height:100%;display:block;object-fit:contain;}
.site-search{

align-items:center;
background:#f2f2f2;
border-radius:30px;
overflow:hidden;

.site-search input{
width:100%;
padding:13px;
border:none;
outline:none;
background:transparent;
font-size:15px;

.image-search-btn{
width:38px;
height:38px;
margin-right:4px;

border-radius:50%;
background:white;

.top-icons{display:flex;gap:15px;font-size:24px;align-items:center;}
.top-icons a{text-decoration:none;color:black;position:relative;}
.cart-count{position:absolute;top:-8px;right:-10px;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:#ff2a2a;color:white;font-size:11px;font-weight:bold;display:none;align-items:center;justify-content:center;}
@media(max-width:480px){.topbar{gap:7px;padding:7px 8px}.home-logo{width:82px;height:34px}.site-search input{padding:11px;font-size:13px}.image-search-btn{width:34px;height:34px;font-size:15px}.top-icons{gap:10px;font-size:21px}}

</style>
</head>

<div class="site-search"><input type="text" placeholder="Search Cyclify" data-global-search><button class="image-search-btn" id="headerImageSearchButton" type="button" aria-label="Search by image">&#128247;</button><input type="file" id="headerImageSearchInput" accept="image/*" hidden></div>
<div class="top-icons">
<a href="account.html" aria-label="Account">&#128100;</a>
<a href="cart.html" aria-label="Cart">&#128722;<span class="cart-count" id="cartCount"></span></a>
</div>

<script>
(function(){
const imageButton=document.getElementById("headerImageSearchButton");
const imageInput=document.getElementById("headerImageSearchInput");
if(imageButton&&imageInput){
imageButton.addEventListener("click",()=>imageInput.click());
imageInput.addEventListener("change",()=>{
const file=imageInput.files&&imageInput.files[0];
if(!file){return;}
const reader=new FileReader();
reader.onload=()=>{
sessionStorage.setItem("pendingImageSearchData",reader.result);
window.location.href="index.html#image-search";
};
reader.readAsDataURL(file);
});
}
const globalSearch=document.querySelector("[data-global-search]");
if(globalSearch){
globalSearch.addEventListener("keydown",event=>{
if(event.key!=="Enter"){return;}
const query=globalSearch.value.trim();
if(!query){return;}
sessionStorage.setItem("pendingSearchQuery",query);
window.location.href="index.html";
});
}
const cartCount=document.getElementById("cartCount");
if(cartCount){
const cartItems=JSON.parse(localStorage.getItem("cart"))||[];
const count=cartItems.reduce((total,item)=>total+(item.quantity||1),0);
if(count>0){cartCount.textContent=count;cartCount.style.display="flex";}
else{cartCount.style.display="none";}
}
})();
</script>

const params=new URLSearchParams(window.location.search);
const productId=Number(params.get("id"))||1;
const product=products.find(item=>item.id===productId)||products[0];
let productImages=product.images||[product.image];
let currentImageIndex=0;
let selectedSize=product.sizes&&product.sizes.length?product.sizes[0]:"";
let selectedValveLength=product.valveLengths&&product.valveLengths.length?product.valveLengths[0]:"";
const backLink=document.querySelector(".back");
const productGallery=document.getElementById("productGallery");
const hasMultipleImages=productImages.length>1;

if(backLink){
const wheelProductIds=[7,30,31,37];
backLink.href=wheelProductIds.includes(product.id)?"wheels-tyres.html":product.id>=5?"electronics.html":"bikes-frames.html";
}
productGallery.classList.toggle("single-image",!hasMultipleImages);

function updateCartCount(){

const cartItems=JSON.parse(localStorage.getItem("cart"))||[];
const count=cartItems.reduce((total,item)=>total+(item.quantity||1),0);
const cartCount=document.getElementById("cartCount");

if(count>0){
cartCount.textContent=count;
cartCount.style.display="flex";
}
else{
cartCount.style.display="none";
}

}

updateCartCount();

document.getElementById("productName").textContent=product.name;
document.getElementById("productPrice").textContent=`₹${product.price.toLocaleString()}`;
document.getElementById("productMrp").textContent=`MRP ${product.mrp}`;

const sizeSection=document.getElementById("sizeSection");
const sizeOptions=document.getElementById("sizeOptions");
const valveSection=document.getElementById("valveSection");
const valveOptions=document.getElementById("valveOptions");

if(product.sizes&&product.sizes.length){

sizeSection.style.display="block";

product.sizes.forEach(size=>{
sizeOptions.innerHTML+=`
<button
class="size-btn"
onclick="selectSize('${size}')">
${size}
</button>
`;
});

}
else{

sizeSection.style.display="none";

}

if(product.valveLengths&&product.valveLengths.length){

valveSection.style.display="block";

product.valveLengths.forEach(length=>{
valveOptions.innerHTML+=`
<button
class="size-btn valve-btn"
onclick="selectValveLength('${length}')">
${length}
</button>
`;
});

}
else{

valveSection.style.display="none";

}

function selectSize(size){

selectedSize=size;

document.querySelectorAll(".size-btn").forEach(button=>{
button.classList.toggle("active",button.textContent.trim()===size);
});

}

if(selectedSize){
selectSize(selectedSize);
}

function selectValveLength(length){

selectedValveLength=length;

document.querySelectorAll(".valve-btn").forEach(button=>{
button.classList.toggle("active",button.textContent.trim()===length);
});

}

if(selectedValveLength){
selectValveLength(selectedValveLength);
}

function showImage(index){

if(!productImages.length){
return;
}

currentImageIndex=(index+productImages.length)%productImages.length;

const image=document.getElementById("productImage");
image.src=productImages[currentImageIndex];
image.alt=product.name;

document.getElementById("imageCount").textContent=
`${currentImageIndex+1}/${productImages.length}`;

document.querySelectorAll(".thumb").forEach((thumb,thumbIndex)=>{
thumb.classList.toggle("active",thumbIndex===currentImageIndex);
});

document.getElementById("productGallery").classList.remove("zoomed");

}

function changeImage(step){
if(!hasMultipleImages){
return;
}
showImage(currentImageIndex+step);
}

const productThumbs=document.getElementById("productThumbs");

productImages.forEach((image,index)=>{
productThumbs.innerHTML+=`
<img
class="thumb"
src="${image}"
alt="${product.name} image ${index+1}"
onclick="showImage(${index})">
`;
});

showImage(0);

let touchStartX=0;

document.getElementById("productGallery").addEventListener("touchstart",event=>{
touchStartX=event.changedTouches[0].screenX;
});

document.getElementById("productGallery").addEventListener("touchend",event=>{

if(!hasMultipleImages){
return;
}

const touchEndX=event.changedTouches[0].screenX;
const swipeDistance=touchEndX-touchStartX;

if(Math.abs(swipeDistance)>45){
changeImage(swipeDistance<0?1:-1);
}

});

document.getElementById("galleryMain").addEventListener("click",()=>{
document.getElementById("productGallery").classList.toggle("zoomed");
});

const specList=document.getElementById("specList");

product.specs.forEach(spec=>{
specList.innerHTML+=`
<div class="spec">
${spec}
</div>
`;
});

const relatedProducts=document.getElementById("relatedProducts");

products
.filter(item=>item.id!==product.id)
.forEach(item=>{
relatedProducts.innerHTML+=`
<a class="related-card" href="product.html?id=${item.id}">
<img src="${item.image}" alt="${item.name}">
<p>${item.name}</p>
</a>
`;
});

function addToCart(){

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let existing=cart.find(item=>
item.id===product.id&&
(item.size||"")===(selectedSize||"")&&
(item.valveLength||"")===(selectedValveLength||"")
);

if(existing){
existing.quantity++;
}
else{
cart.push({
id:product.id,
name:product.name,
price:product.price,
image:product.image,
size:selectedSize,
valveLength:selectedValveLength,
quantity:1
});
}

localStorage.setItem("cart",JSON.stringify(cart));
updateCartCount();
window.location.href="cart.html";

}

function buyOnWhatsApp(){

window.location.href="https://wa.me/message/MLT2FFSAEYGIP1";

}
