<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Product - Cyclify</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

..header{
background:black;
padding:8px 12px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #e5e5e5;
}

.left-header{
display:flex;
align-items:center;
gap:12px;
}

.back{
color:white;
font-size:28px;
text-decoration:none;
}

.logo{
height:38px;
}

.cart-box{
position:relative;
color:white;
font-size:24px;
text-decoration:none;
}

.cart-count{
position:absolute;
top:-8px;
right:-10px;
background:red;
color:white;
width:18px;
height:18px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
}

.product-container{
padding:15px;
}

.breadcrumb{
margin-bottom:12px;
font-size:14px;
color:#666;
}

.product-card{
background:white;
padding:15px;
border-radius:15px;
}

.product-image{
width:100%;
height:300px;
object-fit:contain;
border-radius:12px;
background:#f8f8f8;
}

.product-name{
font-size:28px;
font-weight:bold;
margin-top:15px;
}

.price{
font-size:24px;
font-weight:bold;
color:#0039a6;
margin-top:10px;
}

.description{
margin-top:25px;
line-height:1.8;
color:#555;
}

.buttons{
display:flex;
gap:10px;
margin-top:25px;
}

.cart-btn,
.buy-btn{

flex:1;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;

}

.cart-btn{
background:black;
color:white;
}

.buy-btn{
background:#25D366;
color:white;
}

.related-title{
margin-top:35px;
margin-bottom:15px;
}

.products{
display:flex;
gap:10px;
overflow-x:auto;
}

.related-card{

background:#f2f2f2;
padding:10px;
border-radius:12px;
min-width:140px;
text-align:center;

}

.related-card img{

width:100%;
height:90px;
object-fit:cover;
border-radius:10px;

}

.related-card p{
margin-top:8px;
font-size:14px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">

<div class="left-header">

<a
href="javascript:history.back()"
class="back">

←

</a>

<a href="index.html">

<img
src="assets/Logo.png"
class="logo">

</a>

</div>

<a
href="cart.html"
class="cart-box">

🛒

<div
class="cart-count"
id="cartCount">

0

</div>

</a>

</div>

<div class="product-container">

<div class="breadcrumb">

Home > Bikes & Frames

</div>

<div class="product-card">

<img
class="product-image">

<div
class="product-name">

</div>

<div
class="price">

</div>

<div class="buttons">

<button
class="cart-btn"
onclick="addToCart()">

Add To Cart

</button>

<button
class="buy-btn"
onclick="buyNow()">

Buy Now

</button>

</div>

<div class="description">

<h3>Description</h3>

<p id="productDescription">

</p>

</div>

<h3 class="related-title">

Related Products

</h3>

<div class="products">

<div class="related-card">

<img
src="assets/products/carbon-wheel.jpg">

<p>

Carbon Wheels

</p>

</div>

<div class="related-card">

<img
src="assets/products/trainer.jpg">

<p>

Smart Trainer

</p>

</div>

</div>

</div>

</div>

<script>

const products={

1:{

name:
"SAVA Hawkeye 7.2",

price:
"₹1,89,900",

image:
"assets/products/sava-hawkeye.jpg",

description:
`Full Carbon Road Bike

• Shimano 105 24-Speed

• Hydraulic Disc Brakes

• Carbon Frame

• Lightweight Race Geometry`

}

};

const params=
new URLSearchParams(
window.location.search
);

const id=
params.get("id");

const product=
products[id];

document.querySelector(
".product-image"
).src=
product.image;

document.querySelector(
".product-name"
).innerText=
product.name;

document.querySelector(
".price"
).innerText=
product.price;

document.getElementById(
"productDescription"
).innerText=
product.description;

updateCartCount();

function addToCart(){

let cart=
JSON.parse(
localStorage.getItem(
"cart"
)
)||[];

let exists=
cart.find(
item=>
item.name===
product.name
);

if(exists){

exists.quantity++;

}else{

product.quantity=1;

cart.push(product);

}

localStorage.setItem(

"cart",
JSON.stringify(cart)

);

updateCartCount();

alert(
"Added To Cart"
);

}

function updateCartCount(){

let cart=
JSON.parse(
localStorage.getItem(
"cart"
)
)||[];

let total=0;

cart.forEach(item=>{

total +=
item.quantity || 1;

});

document.getElementById(
"cartCount"
).innerText=
total;

}

function buyNow(){

let message=
encodeURIComponent(

"Hi Cyclify,\n\nI want:\n"+
product.name+
"\n"+
product.price

);

window.open(
"https://wa.me/message/MLT2FFSAEYGIP1?text="+message
);

}

</script>

</body>
</html>
