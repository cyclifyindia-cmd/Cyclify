<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Product - Cyclify</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:15px;
}

.product{
background:white;
padding:15px;
border-radius:15px;
}

.product img{
width:100%;
border-radius:10px;
}

h2{
margin-top:15px;
}

.price{
font-size:22px;
font-weight:bold;
margin:15px 0;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
margin-top:10px;
}

.cart-btn{
background:black;
color:white;
}

.buy-btn{
background:#25D366;
color:white;
}

</style>
</head>

<body>

<div class="product">

<img src="assets/sample-bike.jpg">

<h2>ELVES Road Bike</h2>

<div class="price">
₹59,999
</div>

<button class="cart-btn"
onclick="addToCart()">
Add To Cart
</button>

<button class="buy-btn"
onclick="buyNow()">
Buy Now
</button>

</div>

<script>

function addToCart(){

let cart =
JSON.parse(
localStorage.getItem("cart")
) || [];

cart.push({

name:"ELVES Road Bike",
price:59999

});

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

alert("Added to cart");

}

function buyNow(){

let message =
encodeURIComponent(
"Hi Cyclify,\n\nI want to buy:\nELVES Road Bike\nPrice: ₹59,999"
);

window.open(
"https://wa.me/message/MLT2FFSAEYGIP1?text="+message,
"_blank"
);

}

</script>

</body>
</html>
