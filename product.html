<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Cyclify Product</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding-bottom:90px;
}

/* HEADER */

.header{

background:black;
padding:12px 15px;

display:flex;
justify-content:space-between;
align-items:center;

position:sticky;
top:0;
z-index:1000;

}

.left{

display:flex;
align-items:center;
gap:15px;

}

.back{

color:white;
text-decoration:none;
font-size:24px;

}

.logo{

color:#ff2a2a;
font-size:22px;
font-weight:bold;

}

.cart{

position:relative;
font-size:24px;
text-decoration:none;
color:white;

}

/* PRODUCT */

.product{

background:white;
padding:20px;

}

.product img{

width:100%;
height:300px;
object-fit:contain;

}

.name{

font-size:28px;
font-weight:bold;
margin-top:15px;

}

.price{

font-size:32px;
font-weight:bold;
margin:10px 0;

}

.mrp{

color:gray;
margin-bottom:20px;

}

/* BUTTONS */

.buttons{

display:flex;
gap:10px;

margin-bottom:20px;

}

.btn{

flex:1;
padding:15px;

border:none;

border-radius:12px;

font-size:16px;
font-weight:bold;

}

.cartbtn{

background:black;
color:white;

}

.buybtn{

background:#25D366;
color:white;

}

/* SECTION */

.section{

background:white;
margin-top:10px;
padding:20px;

}

.spec{

padding:15px;
background:#fafafa;
border-radius:12px;
margin-top:10px;

}

/* RELATED */

.related{

display:flex;
overflow-x:auto;
gap:12px;
margin-top:15px;

}

.related-card{

min-width:140px;

background:#fafafa;

padding:10px;

border-radius:12px;
text-decoration:none;
color:black;

}

.related-card img{

width:100%;
height:100px;
object-fit:contain;

}

/* FOOTER FEATURES */

.features{

background:white;

margin-top:15px;
padding:20px;

display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;

}

.feature{

text-align:center;

font-size:14px;
font-weight:bold;

}

</style>
</head>

<body>

<div class="header">

<div class="left">

<a href="bikes-frames.html"
class="back">

←

</a>

<div class="logo">

Cyclify

</div>

</div>

<a href="cart.html"
class="cart">

🛒

</a>

</div>

<div class="product">

<img id="productImage">

<div class="name"
id="productName">

</div>

<div class="price"
id="productPrice">

</div>

<div class="mrp"
id="productMrp">

MRP ₹2,10,000

</div>

<div class="buttons">

<button
class="btn cartbtn"
onclick="addToCart()">

Add to Cart

</button>

<button
class="btn buybtn"
onclick="buyOnWhatsApp()">

WhatsApp Buy

</button>

</div>

</div>

<div class="section">

<h3>
Specifications
</h3>

<div id="specList">
</div>

</div>


<div class="section">

<h3>
Related Products
</h3>

<div class="related"
id="relatedProducts">

</div>

</div>


<div class="features">

<div class="feature">
✅ Authentic Products
</div>

<div class="feature">
🚚 Fast Delivery
</div>

<div class="feature">
📱 WhatsApp Support
</div>

<div class="feature">
🔒 Secure Shopping
</div>

</div>

<script>

const products=[

{
id:1,
name:"SAVA Hawkeye",
price:189900,
mrp:"₹2,10,000",
image:"assets/products/sava-hawkeye.jpg",
specs:[
"Frame : Carbon Fiber",
"Brakes : Hydraulic Disc",
"Wheel : 29 inch"
]
},

{
id:2,
name:"ELVES Falath EVO+",
price:250000,
mrp:"₹2,50,000",
image:"assets/products/elves-falath-evo-plus.jpg",
specs:[
"Frame : Toray T800 & T1000 Carbon Monocoque",
"Groupset : Shimano Di2 2x12 Speed options",
"Wheelset : Carbon wheelset options",
"Cockpit : Orome AeroEvo integrated carbon cockpit",
"Paint : Custom paint options available",
"Type : Aero carbon road bike"
]
}

];

const params=new URLSearchParams(window.location.search);
const productId=Number(params.get("id"))||1;
const product=products.find(item=>item.id===productId)||products[0];

document.getElementById("productImage").src=product.image;
document.getElementById("productImage").alt=product.name;
document.getElementById("productName").textContent=product.name;
document.getElementById("productPrice").textContent=`₹${product.price.toLocaleString()}`;
document.getElementById("productMrp").textContent=`MRP ${product.mrp}`;

const specList=document.getElementById("specList");

product.specs.forEach(spec=>{
specList.innerHTML+=`
<div class="spec">
${spec}
</div>
`;
});

const relatedProducts=document.getElementById("relatedProducts");

products
.filter(item=>item.id!==product.id)
.forEach(item=>{
relatedProducts.innerHTML+=`
<a class="related-card" href="product.html?id=${item.id}">
<img src="${item.image}" alt="${item.name}">
<p>${item.name}</p>
</a>
`;
});

function addToCart(){

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let existing=cart.find(item=>item.id===product.id);

if(existing){
existing.quantity++;
}
else{
cart.push({
id:product.id,
name:product.name,
price:product.price,
image:product.image,
quantity:1
});
}

localStorage.setItem("cart",JSON.stringify(cart));
alert("Added to cart");

}

function buyOnWhatsApp(){

window.location.href="https://wa.me/message/MLT2FFSAEYGIP1";

}

</script>

</body>
</html>
