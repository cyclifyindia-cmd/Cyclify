<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Cyclify Product</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding-bottom:90px;
}

/* HEADER */

.header{

background:black;
padding:12px 15px;

display:flex;
justify-content:space-between;
align-items:center;

position:sticky;
top:0;
z-index:1000;

}

.left{

display:flex;
align-items:center;
gap:15px;

}

.back{

color:white;
text-decoration:none;
font-size:24px;

}

.logo{

color:#ff2a2a;
font-size:22px;
font-weight:bold;

}

.cart{

position:relative;
font-size:24px;
text-decoration:none;
color:white;

}

.cart-count{
position:absolute;
top:-8px;
right:-10px;
min-width:18px;
height:18px;
padding:0 5px;
border-radius:9px;
background:#ff2a2a;
color:white;
font-size:11px;
font-weight:bold;
display:none;
align-items:center;
justify-content:center;
}

/* PRODUCT */

.product{

background:#fff;
padding:20px;

}

.gallery{
position:relative;
background:#fff;
overflow:hidden;
touch-action:pan-y;
}

.gallery-main{
width:100%;
height:330px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
cursor:zoom-in;
}

.gallery-main img{

width:100%;
height:100%;
object-fit:contain;
transition:transform .35s ease;

}

.gallery.zoomed .gallery-main img{
transform:scale(1.45);
cursor:zoom-out;

}

.gallery-btn{
position:absolute;
top:50%;
transform:translateY(-50%);
width:38px;
height:38px;
border:none;
border-radius:50%;
background:rgba(0,0,0,.65);
color:white;
font-size:22px;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
z-index:5;
}

.gallery-btn.prev{
left:8px;
}

.gallery-btn.next{
right:8px;
}

.image-count{
position:absolute;
right:10px;
bottom:10px;
background:rgba(0,0,0,.68);
color:white;
font-size:12px;
font-weight:bold;
padding:6px 10px;
border-radius:20px;
}

.thumbs{
display:flex;
gap:8px;
padding:12px 0 4px;
overflow-x:auto;
}

.thumb{
width:62px;
height:52px;
border:2px solid transparent;
border-radius:10px;
background:#fff;
object-fit:cover;
padding:2px;
cursor:pointer;
}

.thumb.active{
border-color:#0039a6;

}

.name{

font-size:28px;
font-weight:bold;
margin-top:15px;

}

.price{

font-size:32px;
font-weight:bold;
margin:10px 0;

}

.mrp{

color:gray;
margin-bottom:20px;

}

.size-section{
margin:0 0 20px;
}

.size-label{
font-size:14px;
font-weight:bold;
margin-bottom:10px;
}

.size-options{
display:flex;
gap:8px;
overflow-x:auto;
}

.size-btn{
min-width:48px;
height:42px;
border:1px solid #ddd;
border-radius:8px;
background:white;
font-size:15px;
font-weight:bold;
}

.size-btn.active{
background:black;
color:white;
border-color:black;
}

/* BUTTONS */

.buttons{

display:flex;
gap:10px;

margin-bottom:20px;

}

.btn{

flex:1;
padding:15px;

border:none;

border-radius:12px;

font-size:16px;
font-weight:bold;

}

.cartbtn{

background:black;
color:white;

}

.buybtn{

background:#25D366;
color:white;

}

/* SECTION */

.section{

background:white;
margin-top:10px;
padding:20px;

}

.spec{

padding:15px;
background:#fafafa;
border-radius:12px;
margin-top:10px;

}

/* RELATED */

.related{

display:flex;
overflow-x:auto;
gap:12px;
margin-top:15px;

}

.related-card{

min-width:140px;

background:#fafafa;

padding:10px;

border-radius:12px;
text-decoration:none;
color:black;

}

.related-card img{

width:100%;
height:100px;
object-fit:contain;

}

/* FOOTER FEATURES */

.features{

background:white;

margin-top:15px;
padding:20px;

display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;

}

.feature{

text-align:center;

font-size:14px;
font-weight:bold;

}

</style>
</head>

<body>

<div class="header">

<div class="left">

<a href="bikes-frames.html"
class="back">

←

</a>

<div class="logo">

Cyclify

</div>

</div>

<a href="cart.html"
class="cart">

🛒

<span class="cart-count"
id="cartCount">
</span>

</a>

</div>

<div class="product">

<div class="gallery"
id="productGallery">

<button class="gallery-btn prev"
onclick="changeImage(-1)">
‹
</button>

<div class="gallery-main"
id="galleryMain">
<img id="productImage">
</div>

<button class="gallery-btn next"
onclick="changeImage(1)">
›
</button>

<div class="image-count"
id="imageCount">
1/1
</div>

</div>

<div class="thumbs"
id="productThumbs">
</div>

<div class="name"
id="productName">

</div>

<div class="price"
id="productPrice">

</div>

<div class="mrp"
id="productMrp">

MRP ₹2,10,000

</div>

<div class="size-section"
id="sizeSection">

<div class="size-label">
Select Size
</div>

<div class="size-options"
id="sizeOptions">
</div>

</div>

<div class="buttons">

<button
class="btn cartbtn"
onclick="addToCart()">

Add to Cart

</button>

<button
class="btn buybtn"
onclick="buyOnWhatsApp()">

WhatsApp Buy

</button>

</div>

</div>

<div class="section">

<h3>
Specifications
</h3>

<div id="specList">
</div>

</div>


<div class="section">

<h3>
Related Products
</h3>

<div class="related"
id="relatedProducts">

</div>

</div>


<div class="features">

<div class="feature">
✅ Authentic Products
</div>

<div class="feature">
🚚 Fast Delivery
</div>

<div class="feature">
📱 WhatsApp Support
</div>

<div class="feature">
🔒 Secure Shopping
</div>

</div>

<script>

const products=[

{
id:1,
name:"SAVA Hawkeye",
price:189900,
mrp:"₹2,10,000",
image:"assets/products/sava-hawkeye.jpg",
images:[
"assets/products/sava-hawkeye.jpg"
],
sizes:[],
specs:[
"Frame : Carbon Fiber",
"Brakes : Hydraulic Disc",
"Wheel : 29 inch"
]
},

{
id:2,
name:"ELVES Falath EVO+",
price:250000,
mrp:"₹2,50,000",
image:"assets/products/elves-falath-evo-plus.jpg",
images:[
"assets/products/elves-falath-evo-plus-1.jpg",
"assets/products/elves-falath-evo-plus-2.png",
"assets/products/elves-falath-evo-plus-3.png",
"assets/products/elves-falath-evo-plus-4.png",
"assets/products/elves-falath-evo-plus-5.png"
],
sizes:["45","49","52","54","56"],
specs:[
"Frame : Toray T800 & T1000 Carbon Monocoque",
"Groupset : Shimano Di2 2x12 Speed options",
"Wheelset : Carbon wheelset options",
"Cockpit : Orome AeroEvo integrated carbon cockpit",
"Paint : Custom paint options available",
"Type : Aero carbon road bike"
]
},

{
id:3,
name:"ELVES Falath EXP",
price:250000,
mrp:"₹2,50,000",
image:"assets/products/elves-falath-exp-11.png",
images:[
"assets/products/elves-falath-exp-11.png",
"assets/products/elves-falath-exp-3.png",
"assets/products/elves-falath-exp-4.png",
"assets/products/elves-falath-exp-5.png",
"assets/products/elves-falath-exp-6.jpg",
"assets/products/elves-falath-exp-7.jpg",
"assets/products/elves-falath-exp-8.jpg",
"assets/products/elves-falath-exp-9.jpg",
"assets/products/elves-falath-exp-10.jpg"
],
sizes:["45","49","52","54","56"],
specs:[
"Groupset : Shimano 105 12 Speed",
"Frame : Cutting Edge Toray T800 & T1000 Carbon Monocoque Frame",
"Drivetrain : Shimano 105 2x12 Speed Groupset",
"Wheelset : Orome TH50D Carbon Wheelset (other options available)",
"Cockpit : Orome AeroEvo Carbon Cockpit in a Choice of Sizes"
]
},

{
id:4,
name:"ELVES Amanyar",
price:400000,
mrp:"₹4,00,000",
image:"assets/products/elves-amanyar-1.png",
images:[
"assets/products/elves-amanyar-1.png",
"assets/products/elves-amanyar-2.png",
"assets/products/elves-amanyar-3.png",
"assets/products/elves-amanyar-4.png",
"assets/products/elves-amanyar-5.png",
"assets/products/elves-amanyar-6.png",
"assets/products/elves-amanyar-7.png",
"assets/products/elves-amanyar-8.png",
"assets/products/elves-amanyar-9.png",
"assets/products/elves-amanyar-10.png",
"assets/products/elves-amanyar-11.png",
"assets/products/elves-amanyar-12.png",
"assets/products/elves-amanyar-13.png",
"assets/products/elves-amanyar-14.png"
],
sizes:["XS","S","M","L","XL"],
specs:[
"Frame : Carbon Monocoque Triathlon / TT Frame",
"Design : Aerodynamic time trial and triathlon geometry",
"Cockpit : Integrated aero cockpit system",
"Brake : Disc brake setup",
"Wheel : Deep-section aero wheel compatibility",
"Use : Triathlon, time trial, and aero racing"
]
}

];

const params=new URLSearchParams(window.location.search);
const productId=Number(params.get("id"))||1;
const product=products.find(item=>item.id===productId)||products[0];
const productImages=product.images||[product.image];
let currentImageIndex=0;
let selectedSize=product.sizes&&product.sizes.length?product.sizes[0]:"";

function updateCartCount(){

const cartItems=JSON.parse(localStorage.getItem("cart"))||[];
const count=cartItems.reduce((total,item)=>total+(item.quantity||1),0);
const cartCount=document.getElementById("cartCount");

if(count>0){
cartCount.textContent=count;
cartCount.style.display="flex";
}
else{
cartCount.style.display="none";
}

}

updateCartCount();

document.getElementById("productName").textContent=product.name;
document.getElementById("productPrice").textContent=`₹${product.price.toLocaleString()}`;
document.getElementById("productMrp").textContent=`MRP ${product.mrp}`;

const sizeSection=document.getElementById("sizeSection");
const sizeOptions=document.getElementById("sizeOptions");

if(product.sizes&&product.sizes.length){

sizeSection.style.display="block";

product.sizes.forEach(size=>{
sizeOptions.innerHTML+=`
<button
class="size-btn"
onclick="selectSize('${size}')">
${size}
</button>
`;
});

}
else{

sizeSection.style.display="none";

}

function selectSize(size){

selectedSize=size;

document.querySelectorAll(".size-btn").forEach(button=>{
button.classList.toggle("active",button.textContent.trim()===size);
});

}

if(selectedSize){
selectSize(selectedSize);
}

function showImage(index){

currentImageIndex=(index+productImages.length)%productImages.length;

const image=document.getElementById("productImage");
image.src=productImages[currentImageIndex];
image.alt=product.name;

document.getElementById("imageCount").textContent=
`${currentImageIndex+1}/${productImages.length}`;

document.querySelectorAll(".thumb").forEach((thumb,thumbIndex)=>{
thumb.classList.toggle("active",thumbIndex===currentImageIndex);
});

document.getElementById("productGallery").classList.remove("zoomed");

}

function changeImage(step){
showImage(currentImageIndex+step);
}

const productThumbs=document.getElementById("productThumbs");

productImages.forEach((image,index)=>{
productThumbs.innerHTML+=`
<img
class="thumb"
src="${image}"
alt="${product.name} image ${index+1}"
onclick="showImage(${index})">
`;
});

showImage(0);

let touchStartX=0;

document.getElementById("productGallery").addEventListener("touchstart",event=>{
touchStartX=event.changedTouches[0].screenX;
});

document.getElementById("productGallery").addEventListener("touchend",event=>{

const touchEndX=event.changedTouches[0].screenX;
const swipeDistance=touchEndX-touchStartX;

if(Math.abs(swipeDistance)>45){
changeImage(swipeDistance<0?1:-1);
}

});

document.getElementById("galleryMain").addEventListener("click",()=>{
document.getElementById("productGallery").classList.toggle("zoomed");
});

const specList=document.getElementById("specList");

product.specs.forEach(spec=>{
specList.innerHTML+=`
<div class="spec">
${spec}
</div>
`;
});

const relatedProducts=document.getElementById("relatedProducts");

products
.filter(item=>item.id!==product.id)
.forEach(item=>{
relatedProducts.innerHTML+=`
<a class="related-card" href="product.html?id=${item.id}">
<img src="${item.image}" alt="${item.name}">
<p>${item.name}</p>
</a>
`;
});

function addToCart(){

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let existing=cart.find(item=>
item.id===product.id&&
(item.size||"")===(selectedSize||"")
);

if(existing){
existing.quantity++;
}
else{
cart.push({
id:product.id,
name:product.name,
price:product.price,
image:product.image,
size:selectedSize,
quantity:1
});
}

localStorage.setItem("cart",JSON.stringify(cart));
updateCartCount();
window.location.href="cart.html";

}

function buyOnWhatsApp(){

window.location.href="https://wa.me/message/MLT2FFSAEYGIP1";

}

</script>

</body>
</html>
