<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Product - Cyclify</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

.header{
background:black;
padding:12px 15px;
display:flex;
justify-content:space-between;
align-items:center;
color:white;
font-size:22px;
font-weight:bold;
}

.cart-box{
position:relative;
text-decoration:none;
color:white;
font-size:24px;
}

.cart-count{

position:absolute;
top:-8px;
right:-10px;
background:red;
color:white;
font-size:12px;
width:18px;
height:18px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;

}

.product-container{
padding:15px;
}

.product-card{
background:white;
padding:15px;
border-radius:15px;
}

.product-image{
width:100%;
height:300px;
object-fit:cover;
border-radius:12px;
}

.product-name{
font-size:28px;
font-weight:bold;
margin-top:15px;
}

.price{
font-size:24px;
font-weight:bold;
color:#0039a6;
margin-top:10px;
}

.description{
margin-top:20px;
line-height:1.6;
color:#555;
}

.buttons{
display:flex;
gap:10px;
margin-top:25px;
}

.cart-btn,
.buy-btn{

flex:1;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
}

.cart-btn{
background:black;
color:white;
}

.buy-btn{
background:#25D366;
color:white;
}

.products{
display:flex;
overflow-x:auto;
gap:10px;
margin-top:15px;
}

.related-card{

background:#f2f2f2;
padding:10px;
border-radius:10px;
min-width:130px;
text-align:center;

}

.related-card img{

width:100%;
height:90px;
object-fit:cover;
border-radius:8px;

}

</style>
</head>

<body>

<div class="header">

<span>Cyclify</span>

<a href="cart.html"
class="cart-box">

🛒

<div
class="cart-count"
id="cartCount">

0

</div>

</a>

</div>

<div class="product-container">

<div class="product-card">

<img
class="product-image">

<div
class="product-name">
</div>

<div
class="price">
</div>

<div class="buttons">

<button
class="cart-btn"
onclick="addToCart()">

Add To Cart

</button>

<button
class="buy-btn"
onclick="buyNow()">

Buy Now

</button>

</div>

<div class="description">

<h3>Description</h3>

<p id="productDescription">

</p>

</div>

<div style="margin-top:30px;">

<h3>
Related Products
</h3>

<div class="products">

<div class="related-card">

<img src=
"assets/products/sava-hawkeye.jpg">

<p>
Carbon Wheels
</p>

</div>

<div class="related-card">

<img src=
"assets/products/sava-hawkeye.jpg">

<p>
Smart Trainer
</p>

</div>

</div>

</div>

</div>

</div>

<script>

const products={

1:{

name:
"SAVA Hawkeye 7.2",

price:
"₹1,89,900",

image:
"assets/products/sava-hawkeye.jpg",

description:
`Full Carbon Road Bike

• Shimano 105 24-Speed

• Hydraulic Disc Brakes

• Carbon Frame

• Lightweight Race Geometry`

}

};

const params=
new URLSearchParams(
window.location.search
);

const id=
params.get("id");

const product=
products[id];

document.querySelector(
".product-image"
).src=
product.image;

document.querySelector(
".product-name"
).innerText=
product.name;

document.querySelector(
".price"
).innerText=
product.price;

document.getElementById(
"productDescription"
).innerText=
product.description;


updateCartCount();


function addToCart(){

let cart=

JSON.parse(

localStorage.getItem(
"cart"

)

)||[];

cart.push(product);

localStorage.setItem(

"cart",

JSON.stringify(
cart
)

);

updateCartCount();

alert(
"Added To Cart"
);

}


function updateCartCount(){

let cart=

JSON.parse(

localStorage.getItem(
"cart"

)

)||[];

document.getElementById(

"cartCount"

).innerText=

cart.length;

}


function buyNow(){

let message=

encodeURIComponent(

"Hi Cyclify,\n\nI want:\n"

+product.name+

"\n"

+product.price

);

window.open(

"https://wa.me/message/MLT2FFSAEYGIP1?text="

+message

);

}

</script>

</body>
</html>
