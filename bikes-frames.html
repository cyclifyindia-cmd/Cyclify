<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Bikes & Frames | Cyclify</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding-bottom:80px;
}


/* TOP BAR */

.topbar{

position:sticky;
top:0;

background:white;

display:flex;
align-items:center;
gap:10px;

padding:12px;

box-shadow:0 2px 8px rgba(0,0,0,.1);

z-index:1000;

}

.home-logo{

display:flex;
align-items:center;
text-decoration:none;

}

.home-logo img{

height:42px;
display:block;

}

.search-box{

flex:1;

}

.search-box input{

width:100%;
padding:13px;

border:none;
outline:none;

border-radius:30px;

background:#f2f2f2;

font-size:15px;

}

.top-icons{

display:flex;
gap:15px;

font-size:24px;

}

.top-icons a{

text-decoration:none;
color:black;
position:relative;

}

.cart-count{
position:absolute;
top:-8px;
right:-10px;
min-width:18px;
height:18px;
padding:0 5px;
border-radius:9px;
background:#ff2a2a;
color:white;
font-size:11px;
font-weight:bold;
display:none;
align-items:center;
justify-content:center;
}


/* TITLE */

.page-title{

padding:20px;

font-size:30px;
font-weight:bold;

}


/* PRODUCTS */

.products{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:0;

}

.card{

background:white;

border-right:1px solid #eee;
border-bottom:1px solid #eee;
cursor:pointer;
transition:transform .18s ease, box-shadow .18s ease;

}

.card:hover{

transform:translateY(-2px);
box-shadow:0 8px 18px rgba(0,0,0,.08);

}

.card img{

width:100%;
height:180px;

object-fit:contain;

background:white;
padding:10px;

cursor:pointer;

}

.details{

padding:10px;

}

.details h3{

font-size:16px;

line-height:1.4;

height:45px;

margin-bottom:10px;

}

.price{

font-size:22px;
font-weight:bold;

margin-bottom:5px;

}

.mrp{

font-size:14px;
color:gray;

margin-bottom:20px;

}

.bottom{

display:flex;
justify-content:space-between;
align-items:center;

}

.heart{

width:45px;
height:45px;

border:2px solid #ddd;

border-radius:12px;

display:flex;
align-items:center;
justify-content:center;

font-size:22px;

}

.add{

padding:12px 15px;

border-radius:12px;

border:2px solid #ddd;

background:white;

font-weight:bold;

cursor:pointer;

}


/* BOTTOM BAR */

.bottom-nav{

position:fixed;

bottom:0;
left:0;

width:100%;

background:white;

display:flex;
justify-content:space-around;

padding:15px;

box-shadow:0 -2px 10px rgba(0,0,0,.1);

z-index:1000;

}

.nav-item{

text-align:center;

font-size:14px;
font-weight:bold;

cursor:pointer;

}

</style>

</head>

<body>



<!-- TOP BAR -->

<div class="topbar">

<a href="index.html"
class="home-logo">
<img src="assets/Logo.png"
alt="Cyclify">
</a>


<div class="search-box">

<input
type="text"
placeholder="Search Bikes">

</div>


<div class="top-icons">

<span>♡</span>

<a href="cart.html">
🛒
<span class="cart-count"
id="cartCount">
</span>
</a>

</div>

</div>



<div class="page-title">

🚴 Bikes & Frames

</div>



<div
class="products"
id="products">

</div>



<!-- BOTTOM BAR -->

<div class="bottom-nav">

<div class="nav-item">

↕<br>
Sort

</div>

<div class="nav-item">

⚙️<br>
Filters

</div>

</div>



<script>

const products=[

{
id:1,
name:"SAVA Hawkeye",
price:189900,
mrp:"₹2,10,000",
image:"assets/products/sava-hawkeye.jpg",
sizes:[]
},

{
id:2,
name:"ELVES Falath EVO+",
price:250000,
mrp:"₹2,50,000",
image:"assets/products/elves-falath-evo-plus.jpg",
sizes:["45","49","52","54","56"]
},

{
id:3,
name:"ELVES Falath EXP",
price:250000,
mrp:"₹2,50,000",
image:"assets/products/elves-falath-exp-11.png",
sizes:["45","49","52","54","56"]
}

];


const container=
document.getElementById(
"products"
);

function updateCartCount(){

const cartItems=JSON.parse(localStorage.getItem("cart"))||[];
const count=cartItems.reduce((total,item)=>total+(item.quantity||1),0);
const cartCount=document.getElementById("cartCount");

if(count>0){
cartCount.textContent=count;
cartCount.style.display="flex";
}
else{
cartCount.style.display="none";
}

}

updateCartCount();


products.forEach(product=>{

container.innerHTML+=`

<div class="card"
onclick="openProduct(${product.id})"
tabindex="0"
role="link"
onkeydown="handleCardKey(event,${product.id})">

<img
src="${product.image}">

<div class="details">

<h3>
${product.name}
</h3>

<div class="price">

₹${product.price.toLocaleString()}

</div>

<div class="mrp">

MRP ${product.mrp}

</div>

<div class="bottom">

<div class="heart">

♡

</div>

<button
class="add"
onclick="addToCart(event,${product.id})">

Add to cart

</button>

</div>

</div>

</div>

`;

});


function openProduct(id){

window.location=
`product.html?id=${id}`;

}


function handleCardKey(event,id){

if(event.key==="Enter"||event.key===" "){

event.preventDefault();
openProduct(id);

}

}


function addToCart(event,id){

event.stopPropagation();

let cart=
JSON.parse(
localStorage.getItem("cart")
)||[];


let product=
products.find(
p=>p.id===id
);

if(product.sizes&&product.sizes.length){

window.location=
`product.html?id=${id}`;

return;

}


let existing=
cart.find(
item=>item.id===id
);


if(existing){

existing.quantity++;

}

else{

cart.push({

id:product.id,
name:product.name,
price:product.price,
image:product.image,
quantity:1

});

}


localStorage.setItem(

"cart",

JSON.stringify(cart)

);

updateCartCount();
window.location.href="cart.html";

}

</script>

</body>
</html>
