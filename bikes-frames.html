<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Bikes & Frames | Cyclify</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding-bottom:80px;
}


/* TOP BAR */

.topbar{

position:sticky;
top:0;

background:white;

display:flex;
align-items:center;
gap:10px;

padding:12px;

box-shadow:0 2px 8px rgba(0,0,0,.1);

z-index:1000;

}

.menu{

font-size:28px;

}

.search-box{

flex:1;

}

.search-box input{

width:100%;
padding:13px;

border:none;
outline:none;

border-radius:30px;

background:#f2f2f2;

font-size:15px;

}

.top-icons{

display:flex;
gap:15px;

font-size:24px;

}

.top-icons a{

text-decoration:none;
color:black;

}


/* TITLE */

.page-title{

padding:20px;

font-size:30px;
font-weight:bold;

}


/* PRODUCTS */

.products{

display:grid;

grid-template-columns:
repeat(2,1fr);

gap:0;

}

.card{

background:white;

border-right:1px solid #eee;
border-bottom:1px solid #eee;

}

.card img{

width:100%;
height:180px;

object-fit:contain;

background:#fafafa;

cursor:pointer;

}

.details{

padding:10px;

}

.details h3{

font-size:16px;

line-height:1.4;

height:45px;

margin-bottom:10px;

}

.price{

font-size:22px;
font-weight:bold;

margin-bottom:5px;

}

.mrp{

font-size:14px;
color:gray;

margin-bottom:20px;

}

.bottom{

display:flex;
justify-content:space-between;
align-items:center;

}

.heart{

width:45px;
height:45px;

border:2px solid #ddd;

border-radius:12px;

display:flex;
align-items:center;
justify-content:center;

font-size:22px;

}

.add{

padding:12px 15px;

border-radius:12px;

border:2px solid #ddd;

background:white;

font-weight:bold;

cursor:pointer;

}


/* BOTTOM BAR */

.bottom-nav{

position:fixed;

bottom:0;
left:0;

width:100%;

background:white;

display:flex;
justify-content:space-around;

padding:15px;

box-shadow:0 -2px 10px rgba(0,0,0,.1);

z-index:1000;

}

.nav-item{

text-align:center;

font-size:14px;
font-weight:bold;

cursor:pointer;

}

</style>

</head>

<body>



<!-- TOP BAR -->

<div class="topbar">

<div class="menu">
☰
</div>


<div class="search-box">

<input
type="text"
placeholder="Search Bikes">

</div>


<div class="top-icons">

<span>♡</span>

<a href="cart.html">
🛒
</a>

</div>

</div>



<div class="page-title">

🚴 Bikes & Frames

</div>



<div
class="products"
id="products">

</div>



<!-- BOTTOM BAR -->

<div class="bottom-nav">

<div class="nav-item">

↕<br>
Sort

</div>

<div class="nav-item">

⚙️<br>
Filters

</div>

</div>



<script>

const products=[

{
id:1,
name:"SAVA Hawkeye",
price:189900,
mrp:"₹2,10,000",
image:"assets/products/sava-hawkeye.jpg"
}

];


const container=
document.getElementById(
"products"
);


products.forEach(product=>{

container.innerHTML+=`

<div class="card">

<img
src="${product.image}"
onclick="openProduct(${product.id})">

<div class="details">

<h3>
${product.name}
</h3>

<div class="price">

₹${product.price.toLocaleString()}

</div>

<div class="mrp">

MRP ${product.mrp}

</div>

<div class="bottom">

<div class="heart">

♡

</div>

<button
class="add"
onclick="addToCart(${product.id})">

Add to cart

</button>

</div>

</div>

</div>

`;

});


function openProduct(id){

window.location=
`product.html?id=${id}`;

}


function addToCart(id){

let cart=
JSON.parse(
localStorage.getItem("cart")
)||[];


let product=
products.find(
p=>p.id===id
);


let existing=
cart.find(
item=>item.id===id
);


if(existing){

existing.quantity++;

}

else{

cart.push({

id:product.id,
name:product.name,
price:product.price,
image:product.image,
quantity:1

});

}


localStorage.setItem(

"cart",

JSON.stringify(cart)

);

alert("Added to cart");

}

</script>

</body>
</html>
