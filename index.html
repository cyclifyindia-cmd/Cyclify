<!DOCTYPE html>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

.header{
background:black;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
height:65px;
}

.icons{

.icons a{

}

.search{

}

.search-box{

}

.search-box input{
width:100%;
padding:15px;
border:none;

font-size:16px;

}

.search-placeholder{

.search-box input:focus{

}

.location{

padding:0 15px 15px;

}

.offer{

color:white;
padding:15px;
display:flex;
overflow-x:auto;
gap:10px;
}

.offer-box{
min-width:160px;
background:white;
color:black;
padding:10px;
border-radius:8px;
text-align:center;
font-size:14px;
}

.categories{
padding:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.category{
height:180px;
border-radius:12px;
background-size:cover;
background-position:center;
text-decoration:none;
overflow:hidden;
}

.bikes{
background-image:url('assets/categories/CAT_BIKEE.png');
}

.wearables{
background-image:url('assets/categories/CAT_Wearables.png');
}

.accessories{
background-image:url('assets/categories/CAT_ACC.png');
}

.components{
background-image:url('assets/categories/CAT_Components.png');
}

.wheels{
background-image:url('assets/categories/CAT_Wheels.png');
}

.electronics{
background-image:url('assets/categories/CAT_Electronics.png');
}

.hero{
margin:15px;
background:#111827;
color:white;
border-radius:20px;
padding:30px 20px;
}

.hero h2{
font-size:34px;
margin-bottom:10px;
}

.hero p{
font-size:16px;
margin-bottom:20px;
}

.btn{
background:white;
color:black;
padding:12px 24px;
border-radius:30px;
display:inline-block;
font-weight:bold;
text-decoration:none;
}

.features{
background:white;
margin-top:15px;
padding:20px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
text-align:center;
}

.feature{
font-size:14px;
font-weight:bold;
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
text-decoration:none;
box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<div class="header">

<img src="assets/Logo.png" class="logo">

<div class="icons">
<a href="#">👤</a>
<a href="cart.html">🛒</a>
</div>

</div>

<div class="search">

<div class="search-box">

<input
type="text"
id="searchInput"
autocomplete="off">

<div class="search-placeholder" id="animatedPlaceholder">
<span>🔍</span>
<span id="typingText"></span>
</div>

</div>

</div>

<div class="location">
📍 Delivering Across India
</div>

<div class="offer">

<div class="offer-box">
<h3>₹100 OFF</h3>
<p>Code: CY100</p>
</div>

<div class="offer-box">
<h3>₹200 OFF</h3>
<p>Code: CY200</p>
</div>

<div class="offer-box">
<h3>₹300 OFF</h3>
<p>Code: CY300</p>
</div>

</div>

<div class="categories">

<a href="bikes-frames.html" class="category bikes"></a>

<a href="wearables.html" class="category wearables"></a>

<a href="accessories.html" class="category accessories"></a>

<a href="components.html" class="category components"></a>

<a href="wheels-tyres.html" class="category wheels"></a>

<a href="electronics.html" class="category electronics"></a>

</div>

<div class="hero">

<h2>Ride Further.</h2>

<p>
Premium Cycling Products for Every Rider.
</p>

<a href="bikes-frames.html" class="btn">
Shop Now
</a>

</div>

<div class="features">

<div class="feature">✅ Authentic Products</div>

<div class="feature">🚚 Fast Delivery</div>

<div class="feature">📱 WhatsApp Support</div>

<div class="feature">🔒 Secure Shopping</div>

</div>

<a class="whatsapp"
href="https://wa.me/message/MLT2FFSAEYGIP1">
💬
</a>

<script>

const words = [
"ELVES Road Bikes",
"Smart Trainers",
"Carbon Wheels"
];

const textElement = document.getElementById("typingText");
const placeholder = document.getElementById("animatedPlaceholder");
const input = document.getElementById("searchInput");

let wordIndex = 0;
let charIndex = 0;
let deleting = false;

function animateText(){

const currentWord = words[wordIndex];

if(!deleting){

textElement.textContent =
currentWord.substring(0,charIndex+1);

charIndex++;

if(charIndex === currentWord.length){

deleting = true;

setTimeout(animateText,1500);
return;

}

}else{

textElement.textContent =
currentWord.substring(0,charIndex-1);

charIndex--;

if(charIndex === 0){

deleting = false;
wordIndex = (wordIndex + 1) % words.length;

}

}

setTimeout(
animateText,
deleting ? 60 : 120
);

}

animateText();

input.addEventListener("focus",()=>{

placeholder.style.display="none";

});

input.addEventListener("blur",()=>{

if(input.value===""){

placeholder.style.display="flex";

}

});

</script>

</body>
</html>
